<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Live · Arena Friends FC</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#0a0c10;color:#fff;font-family:'Rajdhani',sans-serif;min-height:100vh;overscroll-behavior:none;}
:root{--o:#ff8c00;--g:#28a745;--b:#1e2130;--accent:#3d5afe;}

/* ── Header ─────────────────────────────── */
.hd{background:#080a12;border-bottom:1px solid var(--b);padding:8px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:30;}
.hd-logo{font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:3px;}
.hd-right{display:flex;align-items:center;gap:8px;}
.live-pill{display:flex;align-items:center;gap:4px;background:rgba(40,167,69,.12);border:1px solid rgba(40,167,69,.3);padding:2px 7px;border-radius:12px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:#28a745;box-shadow:0 0 6px #28a745;animation:p 1.5s infinite;}
@keyframes p{0%,100%{opacity:1;}50%{opacity:.2;}}
.live-lbl{font-size:.58rem;font-weight:700;color:#69f0ae;text-transform:uppercase;letter-spacing:1px;}
.icon-btn{background:none;border:1px solid var(--b);color:#444;padding:4px 9px;border-radius:6px;font-size:.7rem;cursor:pointer;white-space:nowrap;}
.icon-btn:hover{border-color:#555;color:#aaa;}
.icon-btn.danger{border-color:#c6282833;color:#ef9a9a44;}
.icon-btn.danger:hover{border-color:#c62828;color:#ef9a9a;}

/* ── Timer bar ──────────────────────────── */
.timer-bar{background:#0d0f18;border-bottom:1px solid var(--b);padding:8px 14px;display:flex;align-items:center;gap:10px;}
.timer-btn{padding:6px 16px;border-radius:8px;font-family:'Bebas Neue',sans-serif;font-size:.9rem;letter-spacing:2px;cursor:pointer;border:1px solid;transition:all .12s;flex-shrink:0;}
.timer-btn.start{background:rgba(40,167,69,.1);border-color:var(--g);color:#69f0ae;}
.timer-btn.pause{background:rgba(255,204,0,.1);border-color:#ffcc00;color:#ffcc00;}
.timer-btn.resume{background:rgba(61,90,254,.1);border-color:var(--accent);color:#82b1ff;}
.timer-display{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:#fff;letter-spacing:3px;min-width:60px;}
.timer-display.running{color:#69f0ae;}
.timer-display.paused{color:#ffcc00;}
.half-badge{font-size:.62rem;color:#555;flex:1;}

/* ── Score ──────────────────────────────── */
.score-wrap{background:#080a12;border-bottom:2px solid var(--b);padding:10px 12px 4px;}
.score-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:6px;}
.sc-side{display:flex;flex-direction:column;}
.sc-side.right{align-items:flex-end;}
.sc-lbl{font-size:.58rem;text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:2px;}
.sc-lbl.o{color:var(--o);}
.sc-lbl.g{color:var(--g);}
.sc-n{font-family:'Bebas Neue',sans-serif;font-size:5rem;line-height:.9;transition:transform .15s,text-shadow .15s;}
.sc-n.o{color:var(--o);}
.sc-n.g{color:var(--g);}
.sc-n.bump{transform:scale(1.25);text-shadow:0 0 30px currentColor;}
.sc-sep{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:#1e2130;padding:0 4px;}
.score-sub{text-align:center;font-size:.62rem;color:#555;padding:3px 0 7px;min-height:18px;letter-spacing:.3px;}
.score-sub b{color:#888;}

/* ── Undo bar ───────────────────────────── */
.undo-bar{background:#0d0f18;border-bottom:1px solid var(--b);padding:6px 14px;display:flex;align-items:center;gap:8px;min-height:32px;}
.undo-lbl{flex:1;font-size:.72rem;color:#555;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.undo-lbl span{color:#fff;}
.undo-btn{background:rgba(61,90,254,.1);border:1px solid #2a2d40;color:#82b1ff;padding:3px 10px;border-radius:6px;font-size:.68rem;font-weight:700;cursor:pointer;display:none;white-space:nowrap;flex-shrink:0;}
.undo-btn.show{display:block;}

/* ── Teams ──────────────────────────────── */
.teams-wrap{display:grid;grid-template-columns:1fr 1fr;}
.team-col{padding:6px 5px 8px;}
.team-col.o-col{border-right:1px solid var(--b);}
.team-hd{display:flex;align-items:baseline;justify-content:space-between;padding:3px 4px 6px;border-bottom:1px solid #0f1118;margin-bottom:4px;}
.team-hd-lbl{font-family:'Bebas Neue',sans-serif;font-size:.78rem;letter-spacing:1.5px;}
.team-hd-lbl.o{color:var(--o);}
.team-hd-lbl.g{color:var(--g);}
.team-hd-cnt{font-size:.58rem;color:#333;}
.pr{display:flex;align-items:center;padding:2px 1px;gap:3px;}
.pr-name{flex:1;font-weight:700;font-size:.8rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pr-cnt{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;min-width:20px;text-align:center;color:#252836;transition:color .15s;}
.pr-cnt.has{color:#fff;}
.pr-minus{width:22px;height:36px;background:none;border:none;color:#333;font-size:.85rem;cursor:pointer;display:none;align-items:center;justify-content:center;border-radius:5px;flex-shrink:0;}
.pr-minus.show{display:flex;}
.pr-minus:active{background:#1c1f2b;color:#ef9a9a;}
.pr-plus{width:38px;height:38px;border-radius:8px;border:1px solid;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .1s,background .1s;-webkit-tap-highlight-color:transparent;}
.pr-plus:active{transform:scale(.88);}
.o-col .pr-plus{background:rgba(255,140,0,.08);border-color:rgba(255,140,0,.2);color:var(--o);}
.o-col .pr-plus:active{background:rgba(255,140,0,.22);}
.g-col .pr-plus{background:rgba(40,167,69,.08);border-color:rgba(40,167,69,.2);color:var(--g);}
.g-col .pr-plus:active{background:rgba(40,167,69,.22);}

/* ── Log panel ──────────────────────────── */
.log-toggle{background:#0a0c10;border-top:1px solid var(--b);padding:7px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;}
.log-toggle-lbl{font-size:.72rem;color:#555;display:flex;align-items:center;gap:6px;}
.log-toggle-cnt{background:rgba(61,90,254,.15);border:1px solid #2a2d40;color:#82b1ff;font-size:.6rem;padding:1px 6px;border-radius:10px;}
.log-panel{display:none;background:#080a12;border-top:1px solid var(--b);max-height:220px;overflow-y:auto;padding-bottom:80px;}
.log-panel.open{display:block;}
.log-entry{display:flex;align-items:center;gap:8px;padding:7px 14px;border-bottom:1px solid #0a0c14;font-size:.78rem;}
.log-entry:last-child{border-bottom:none;}
.log-min{font-family:'Bebas Neue',sans-serif;font-size:.85rem;color:#555;min-width:28px;}
.log-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.log-name{flex:1;font-weight:700;}
.log-badge{font-size:.6rem;padding:1px 5px;border-radius:4px;background:rgba(105,240,174,.1);border:1px solid rgba(105,240,174,.2);color:#69f0ae;}
.log-empty{padding:16px 14px;color:#333;font-size:.78rem;text-align:center;}

/* ── Bottom bar ─────────────────────────── */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:#080a12;border-top:1px solid var(--b);padding:8px 12px;display:flex;gap:7px;z-index:30;}
.btn-share{flex:0 0 auto;padding:10px 14px;border-radius:9px;font-family:'Bebas Neue',sans-serif;font-size:.85rem;letter-spacing:1.5px;cursor:pointer;background:#141720;border:1px solid var(--b);color:#555;}
.btn-share:hover{border-color:#555;color:#fff;}
.btn-finalize{flex:1;padding:10px;border-radius:9px;font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:2px;cursor:pointer;background:linear-gradient(135deg,#1a3a2a,var(--g));border:1px solid var(--g);color:#fff;}
.btn-finalize:disabled{opacity:.35;cursor:not-allowed;}

/* ── Confirm dialog ──────────────────────── */
.dialog-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:100;display:none;align-items:flex-end;justify-content:center;padding:0;}
.dialog-overlay.show{display:flex;}
.dialog-box{background:#141720;width:100%;max-width:520px;border-radius:16px 16px 0 0;border:1px solid #2a2d40;border-bottom:none;padding:20px;max-height:85vh;overflow-y:auto;}
.dialog-title{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:3px;margin-bottom:4px;}
.dialog-score{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;margin:8px 0;}
.dialog-section{font-size:.62rem;text-transform:uppercase;letter-spacing:1px;color:#555;margin:12px 0 6px;}
.scorer-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #0f1118;font-size:.82rem;}
.scorer-row:last-child{border-bottom:none;}
.scorer-dot{width:8px;height:8px;border-radius:50%;}
.scorer-name{flex:1;font-weight:700;}
.scorer-goals{font-family:'Bebas Neue',sans-serif;font-size:.95rem;color:#fff;}
.scorer-mins{font-size:.68rem;color:#555;}
.mvp-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:rgba(255,204,0,.06);border:1px solid rgba(255,204,0,.2);border-radius:9px;margin:8px 0;}
.mvp-icon{font-size:1.4rem;}
.mvp-info-lbl{font-size:.6rem;color:#888;text-transform:uppercase;letter-spacing:1px;}
.mvp-info-name{font-weight:700;font-size:.95rem;color:#ffcc00;}
.dialog-actions{display:flex;gap:8px;margin-top:14px;}
.dia-cancel{flex:0 0 auto;padding:12px 16px;border-radius:9px;background:#1c1f2b;border:1px solid #2a2d40;color:#555;font-size:.82rem;cursor:pointer;}
.dia-confirm{flex:1;padding:12px;border-radius:9px;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;cursor:pointer;border:1px solid var(--g);color:#fff;background:linear-gradient(135deg,#1a3a2a,var(--g));}

/* ── Toast ──────────────────────────────── */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#1c1f2b;border:1px solid var(--accent);color:#fff;padding:8px 16px;border-radius:9px;font-size:.82rem;font-weight:700;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;}
.empty-teams{text-align:center;padding:40px 16px;color:#333;grid-column:span 2;font-size:.85rem;}

/* ── 3-team mode ────────────────────────── */
.three-mode-bar{background:#0d0f18;border-top:2px solid #9c27b0;padding:10px 14px;display:none;}
.three-mode-bar.show{display:block;}
.waiting-team{background:linear-gradient(135deg,#1a0050,#2d006a);border:2px dashed #7c4dff;border-radius:12px;padding:10px;margin-bottom:6px;}
.waiting-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.waiting-lbl{font-family:'Bebas Neue',sans-serif;font-size:.85rem;letter-spacing:2px;color:#ce93d8;}
.swap-btn{padding:5px 12px;border-radius:7px;font-size:.72rem;font-weight:700;cursor:pointer;border:none;white-space:nowrap;}
.swap-o{background:rgba(255,140,0,.2);color:var(--o);border:1px solid rgba(255,140,0,.4)!important;}
.swap-g{background:rgba(40,167,69,.2);color:var(--g);border:1px solid rgba(40,167,69,.4)!important;}
.threshold-row{display:flex;align-items:center;gap:8px;padding:6px 0;}
.thr-lbl{font-size:.7rem;color:#555;flex:1;}
.thr-btn{width:24px;height:24px;border-radius:5px;background:#1c1f2b;border:1px solid #252836;color:#888;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.thr-val{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:#ce93d8;min-width:20px;text-align:center;}
.round-badge{font-size:.58rem;padding:1px 5px;border-radius:4px;background:rgba(124,77,255,.15);border:1px solid #7c4dff;color:#ce93d8;margin-left:4px;}
.rotation-toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#1a0050,#4a0080);border:1px solid #7c4dff;color:#fff;padding:14px 24px;border-radius:12px;font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;z-index:500;display:none;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.8);}
.rotation-toast.show{display:block;animation:rotPop .3s ease;}
.time-alert{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#7b1010,#c62828);border:1px solid #ef5350;color:#fff;padding:12px 20px;border-radius:12px;font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:1px;z-index:600;display:none;text-align:center;}
.time-alert.show{display:block;animation:rotPop .3s ease;}
@keyframes rotPop{from{transform:translateX(-50%) scale(.8);opacity:0}to{transform:translateX(-50%) scale(1);opacity:1}}

/* ── Team ID badges ─────────────────────── */
.tid{font-size:.55rem;padding:1px 5px;border-radius:3px;font-weight:700;font-family:'Rajdhani',sans-serif;vertical-align:middle;}
.tid-a{background:rgba(255,140,0,.18);color:#ff8c00;border:1px solid rgba(255,140,0,.35);}
.tid-b{background:rgba(40,167,69,.18);color:#28a745;border:1px solid rgba(40,167,69,.35);}
.tid-c{background:rgba(124,77,255,.18);color:#ce93d8;border:1px solid rgba(124,77,255,.35);}

/* ── Ture history ───────────────────────── */
.ture-section{display:none;background:#080a12;border-top:1px solid #1e2130;}
.ture-section.show{display:block;}
.ture-toggle{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;cursor:pointer;border-bottom:1px solid #0f1118;}
.ture-toggle-lbl{font-size:.72rem;color:#555;display:flex;align-items:center;gap:6px;}
.ture-cnt{background:rgba(124,77,255,.15);border:1px solid #7c4dff;color:#ce93d8;font-size:.6rem;padding:1px 6px;border-radius:10px;}
.ture-body{max-height:220px;overflow-y:auto;display:none;}
.ture-body.open{display:block;}
.tur-row{display:flex;align-items:center;gap:7px;padding:7px 14px;border-bottom:1px solid #0a0c14;font-size:.76rem;}
.tur-row:last-child{border-bottom:none;}
.tur-num{font-family:'Bebas Neue',sans-serif;font-size:.78rem;color:#444;min-width:34px;}
.tur-teams{display:flex;align-items:center;gap:4px;flex:1;}
.tur-score{font-family:'Bebas Neue',sans-serif;font-size:1rem;min-width:28px;text-align:center;}
.tur-meta{font-size:.6rem;color:#444;white-space:nowrap;}
.tur-reason{font-size:.58rem;padding:1px 5px;border-radius:4px;margin-left:3px;}
.tur-reason.goals{background:rgba(40,167,69,.1);border:1px solid rgba(40,167,69,.3);color:#69f0ae;}
.tur-reason.time{background:rgba(124,77,255,.1);border:1px solid #7c4dff;color:#ce93d8;}
.tur-reason.manual{background:rgba(255,204,0,.08);border:1px solid rgba(255,204,0,.3);color:#ffcc00;}
.tur-reason.final{background:rgba(100,100,100,.1);border:1px solid #333;color:#666;}
</style>
</head>
<body>

<!-- Header -->
<div class="hd">
  <div class="hd-logo">⚽ Arena FC</div>
  <div class="hd-right">
    <div class="live-pill"><span class="live-dot"></span><span class="live-lbl">Live</span></div>
    <button class="icon-btn" id="threeBtn" onclick="toggleThreeTeam()" title="Mod 3 Echipe" style="background:rgba(124,77,255,.15);border-color:#7c4dff;color:#ce93d8;font-size:.7rem;padding:5px 8px;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:.5px;border-radius:7px;">3️⃣</button>
    <button class="icon-btn danger" onclick="confirmReset()">↺</button>
  </div>
</div>

<!-- Timer bar -->
<div class="timer-bar">
  <button class="timer-btn start" id="timerBtn" onclick="timerToggle()">▶ Start Meci</button>
  <div class="timer-display" id="timerDisplay">00:00</div>
  <div class="half-badge" id="halfBadge"></div>
</div>

<!-- Score -->
<div class="score-wrap">
  <div class="score-row">
    <div class="sc-side"><div class="sc-lbl o" id="lblO">🟠 Portocaliu</div><div class="sc-n o" id="scoreO">0</div></div>
    <div class="sc-sep">:</div>
    <div class="sc-side right"><div class="sc-lbl g" id="lblG">Verde 🟢</div><div class="sc-n g" id="scoreG">0</div></div>
  </div>
  <div class="score-sub" id="scoreSub"></div>
</div>

<!-- Undo -->
<div class="undo-bar">
  <div class="undo-lbl" id="undoLbl">Niciun gol înregistrat</div>
  <button class="undo-btn" id="undoBtn" onclick="undoLast()">↩ Anulează</button>
</div>

<!-- Teams -->
<div class="teams-wrap" id="teamsWrap">
  <div class="empty-teams">Se încarcă...</div>
</div>

<!-- Rotation toast -->
<div class="rotation-toast" id="rotationToast"></div>
<div class="time-alert" id="timeAlert"></div>

<!-- 3-team waiting bar -->
<div class="three-mode-bar" id="threeBar">
  <div class="waiting-team">
    <div class="waiting-hd">
      <span class="waiting-lbl">⏳ Echipa în Așteptare</span>
      <div style="display:flex;gap:5px;">
        <button class="swap-btn swap-o" onclick="manualSwap('orange')">↔ vs 🟠</button>
        <button class="swap-btn swap-g" onclick="manualSwap('green')">↔ vs 🟢</button>
      </div>
    </div>
    <div id="waitingPlayers" style="display:flex;flex-wrap:wrap;gap:5px;font-size:.75rem;align-items:center;"></div>
  </div>
  <div class="threshold-row">
    <span class="thr-lbl">🎯 Goluri pentru schimb:</span>
    <button class="thr-btn" onclick="changeThreshold(-1)">−</button>
    <span class="thr-val" id="thrVal">2</span>
    <button class="thr-btn" onclick="changeThreshold(1)">+</button>
    <span style="font-size:.62rem;color:#444;">goluri</span>
  </div>
  <div class="threshold-row" style="border-top:1px solid #1e2130;padding-top:5px;">
    <span class="thr-lbl">⏱ Timp maxim per tur:</span>
    <button class="thr-btn" onclick="changeTimeLimitMin(-1)">−</button>
    <span class="thr-val" id="timeLimitVal">10</span>
    <button class="thr-btn" onclick="changeTimeLimitMin(1)">+</button>
    <span style="font-size:.62rem;color:#444;">min</span>
  </div>
  <div id="roundTimeBar" style="display:none;align-items:center;gap:6px;padding:5px 0;border-top:1px solid #1e2130;margin-top:4px;">
    <span style="font-size:.6rem;color:#555;">Tur curent:</span>
    <div style="flex:1;height:5px;background:#1e2130;border-radius:3px;overflow:hidden;">
      <div id="roundTimeFill" style="width:0%;height:100%;background:linear-gradient(90deg,#7c4dff,#ce93d8);border-radius:3px;transition:width 1s linear;"></div>
    </div>
    <span id="roundTimeLeft" style="font-family:'Bebas Neue',sans-serif;font-size:.85rem;color:#ce93d8;min-width:36px;text-align:right;">0:00</span>
  </div>
</div>

<!-- Ture history -->
<div class="ture-section" id="tureSection">
  <div class="ture-toggle" onclick="toggleTure()">
    <span class="ture-toggle-lbl">📊 Istoric Ture <span class="ture-cnt" id="tureCnt">0</span></span>
    <span style="font-size:.7rem;color:#333;" id="tureChevron">▲</span>
  </div>
  <div class="ture-body" id="tureBody"></div>
</div>

<!-- Log toggle -->
<div class="log-toggle" onclick="toggleLog()">
  <span class="log-toggle-lbl">📋 Log goluri <span class="log-toggle-cnt" id="logCnt">0</span></span>
  <span style="font-size:.7rem;color:#333;" id="logChevron">▲</span>
</div>
<div class="log-panel" id="logPanel">
  <div class="log-empty" id="logEmpty">Niciun gol înregistrat.</div>
</div>

<!-- Bottom bar -->
<div class="bottom-bar">
  <button class="btn-share" onclick="shareScore()">📋 Share</button>
  <button class="btn-finalize" id="btnFinalize" onclick="openFinalize()" disabled>🏁 Finalizează Meciul</button>
</div>

<!-- Confirm dialog -->
<div class="dialog-overlay" id="dialogOverlay">
  <div class="dialog-box" id="dialogBox"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const SB_URL='https://lfnumwbjikiyngdxsgrk.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxmbnVtd2JqaWtpeW5nZHhzZ3JrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MDQ1MzEsImV4cCI6MjA5MDA4MDUzMX0.BrrmEHnOwa66hDqN-GhYCyqHqOqTAV7dswjcOVxx-wc';
const sb=window.supabase.createClient(SB_URL,SB_KEY);

// ── State ─────────────────────────────────────────────────────────
let players=[], goals=[], matchStartedAt=null, isSaving=false;

// ── 3-team state ──────────────────────────────────────────────────
let threeTeamMode = localStorage.getItem('live_3team')==='1';
let goalThreshold = parseInt(localStorage.getItem('live_threshold')||'2');
let timeLimitMin  = parseInt(localStorage.getItem('live_tlmin')||'10');

// Team registry — assigned once when 3-team activates, fixed for the match
// colorMap: 'orange' | 'green' | 'bench'  →  'teamA' | 'teamB' | 'teamC'
// teamMap:  'teamA'  | 'teamB' | 'teamC'  →  { players:[], color: }
let colorMap = {};   // color → teamId
let teamMap  = {};   // teamId → { players, color }

// Current round tracking
let roundGoals   = { orange: 0, green: 0 };  // goals conceded by each color this round
let roundGoalLog = [];   // goal objects in current round (for savePairing)
let roundStartSec = 0;
let roundTimer = null, roundTimerInterval = null;

// Completed rounds
let matchPairings = [];

// ── Timer state ───────────────────────────────────────────────────
let timerState = 'idle';
let timerStart = 0, timerElapsed = 0, timerInterval = null;

// ── Timer functions ───────────────────────────────────────────────
function timerSeconds() {
    if (timerState === 'running') return Math.floor((Date.now() - timerStart + timerElapsed) / 1000);
    return Math.floor(timerElapsed / 1000);
}
function timerMinute() { return Math.floor(timerSeconds() / 60); }
function fmtTimer(s) { const m = Math.floor(s/60), ss = s%60; return String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0'); }

function timerToggle() {
    const btn = document.getElementById('timerBtn');
    const disp = document.getElementById('timerDisplay');
    if (timerState === 'idle' || timerState === 'paused') {
        timerStart = Date.now();
        timerState = 'running';
        if (!matchStartedAt) matchStartedAt = new Date().toISOString();
        if (threeTeamMode) {
            if (roundStartSec === 0) roundStartSec = timerSeconds();
            restartRoundTimer();
            const rtBar = document.getElementById('roundTimeBar');
            if (rtBar) rtBar.style.display = 'flex';
        }
        btn.textContent = '⏸ Pauză'; btn.className = 'timer-btn pause';
        disp.className = 'timer-display running';
        timerInterval = setInterval(() => {
            document.getElementById('timerDisplay').textContent = fmtTimer(timerSeconds());
            document.getElementById('halfBadge').textContent = timerMinute() >= 1 ? timerMinute()+"'" : '';
            updateRoundTimerBar();
        }, 500);
    } else {
        timerElapsed += Date.now() - timerStart;
        timerState = 'paused';
        clearInterval(timerInterval);
        btn.textContent = '▶ Continuă'; btn.className = 'timer-btn resume';
        disp.className = 'timer-display paused';
    }
}

function timerReset() {
    clearInterval(timerInterval); timerInterval = null;
    timerState = 'idle'; timerStart = 0; timerElapsed = 0;
    document.getElementById('timerBtn').textContent = '▶ Start Meci';
    document.getElementById('timerBtn').className = 'timer-btn start';
    document.getElementById('timerDisplay').textContent = '00:00';
    document.getElementById('timerDisplay').className = 'timer-display';
    document.getElementById('halfBadge').textContent = '';
}

// ── Team ID registry ──────────────────────────────────────────────
function tidBadge(tid) {
    if (!tid) return '';
    return `<span class="tid tid-${tid.slice(-1).toLowerCase()}">${tid}</span>`;
}

function initTeamRegistry() {
    // Only call when players are already distributed on colors
    const orange = players.filter(p => p.status === 'orange');
    const green  = players.filter(p => p.status === 'green');
    const bench  = players.filter(p => p.status === 'bench');
    // Need at least players on orange and green to make sense
    if (!orange.length && !green.length) return false;
    colorMap = { orange: 'teamA', green: 'teamB', bench: 'teamC' };
    teamMap  = {
        teamA: { players: orange.map(p => p.name), color: 'orange' },
        teamB: { players: green.map(p => p.name),  color: 'green'  },
        teamC: { players: bench.map(p => p.name),  color: 'bench'  },
    };
    return true;
}

// After a swap: loserColor goes to bench, bench comes in on loserColor
// We know exactly which teamIds swapped — update colorMap/teamMap directly
function swapTeamColors(loserColor) {
    const benchColor = 'bench';
    const loserTeamId = colorMap[loserColor];
    const benchTeamId = colorMap[benchColor];
    if (!loserTeamId || !benchTeamId) return;
    // Swap the color assignments
    colorMap[loserColor] = benchTeamId;
    colorMap[benchColor] = loserTeamId;
    teamMap[loserTeamId].color = benchColor;
    teamMap[benchTeamId].color = loserColor;
}

function getTeamIdByColor(color) { return colorMap[color] || null; }

// Cumulative score between two specific teamIds across all completed pairings
function getCumulativeScore(tidA, tidB) {
    let sA = 0, sB = 0, count = 0;
    for (const p of matchPairings) {
        const [pA, pB] = p.teamOnField;
        if ((pA === tidA && pB === tidB) || (pA === tidB && pB === tidA)) {
            sA += p.scores[tidA] || 0;
            sB += p.scores[tidB] || 0;
            count++;
        }
    }
    return { sA, sB, count };
}

// ── 3-team toggle ─────────────────────────────────────────────────
function toggleThreeTeam() {
    threeTeamMode = !threeTeamMode;
    localStorage.setItem('live_3team', threeTeamMode ? '1' : '0');
    const btn = document.getElementById('threeBtn');
    if (btn) {
        btn.style.background = threeTeamMode ? 'rgba(124,77,255,.4)' : 'rgba(124,77,255,.15)';
        btn.style.color = threeTeamMode ? '#fff' : '#ce93d8';
    }
    if (threeTeamMode) {
        // Initialize registry only if players are already on colors
        const ok = initTeamRegistry();
        if (!ok) {
            // No players set yet — will init on first render after players load
        }
        roundGoals = { orange: 0, green: 0 };
        roundGoalLog = [];
        roundStartSec = timerSeconds();
        if (timerState === 'running') restartRoundTimer();
    } else {
        stopRoundTimer();
        colorMap = {}; teamMap = {}; matchPairings = [];
        roundGoals = { orange: 0, green: 0 }; roundGoalLog = [];
    }
    render();
}

// ── 3-team config ─────────────────────────────────────────────────
function changeThreshold(d) {
    goalThreshold = Math.max(1, Math.min(20, goalThreshold + d));
    localStorage.setItem('live_threshold', goalThreshold);
    const el = document.getElementById('thrVal'); if (el) el.textContent = goalThreshold;
}
function changeTimeLimitMin(d) {
    timeLimitMin = Math.max(1, Math.min(90, timeLimitMin + d));
    localStorage.setItem('live_tlmin', timeLimitMin);
    const el = document.getElementById('timeLimitVal'); if (el) el.textContent = timeLimitMin;
    if (threeTeamMode && timerState === 'running') restartRoundTimer();
}

// ── Round timer ───────────────────────────────────────────────────
function restartRoundTimer() {
    stopRoundTimer();
    if (!threeTeamMode) return;
    roundTimer = setTimeout(() => onRoundTimeout(), timeLimitMin * 60 * 1000);
    roundTimerInterval = setInterval(() => updateRoundTimerBar(), 500);
}
function stopRoundTimer() {
    if (roundTimer) { clearTimeout(roundTimer); roundTimer = null; }
    if (roundTimerInterval) { clearInterval(roundTimerInterval); roundTimerInterval = null; }
}
function updateRoundTimerBar() {
    if (!threeTeamMode || timerState === 'idle') return;
    const totalSec = timeLimitMin * 60;
    const elapsed  = timerSeconds() - roundStartSec;
    const remaining = Math.max(0, totalSec - elapsed);
    const pct = Math.min(100, Math.round((elapsed / totalSec) * 100));
    const fill = document.getElementById('roundTimeFill');
    const left = document.getElementById('roundTimeLeft');
    if (fill) {
        fill.style.width = pct + '%';
        fill.style.background = pct > 80
            ? 'linear-gradient(90deg,#e53935,#ef9a9a)'
            : pct > 60
            ? 'linear-gradient(90deg,#ff8c00,#ffcc00)'
            : 'linear-gradient(90deg,#7c4dff,#ce93d8)';
    }
    if (left) { const m = Math.floor(remaining/60), s = remaining%60; left.textContent = m+':'+(s<10?'0':'')+s; }
}
function onRoundTimeout() {
    const bench = players.filter(p => p.status === 'bench');
    if (!bench.length) return;
    const oG = roundGoalLog.filter(g => g.team === 'orange').length;
    const gG = roundGoalLog.filter(g => g.team === 'green').length;
    let loser;
    if (oG === 0 && gG === 0) {
        loser = Math.random() < 0.5 ? 'orange' : 'green';
        showRotationToast('⏱️ 0-0 — ROTAȚIE RANDOM!');
    } else {
        loser = oG >= gG ? 'green' : 'orange';
        showRotationToast(`⏱️ TIMP! ${loser==='orange'?'🟠':'🟢'} Cel mai puțin goluri — IESE!`);
    }
    if (navigator.vibrate) navigator.vibrate([300,100,300]);
    setTimeout(() => doRotation(loser, 'time'), 700);
}

// ── Goal rotation check ───────────────────────────────────────────
function checkGoalRotation() {
    if (!threeTeamMode) return;
    if (!players.filter(p => p.status === 'bench').length) return;
    // roundGoals[color] = goals CONCEDED by that color team
    if (roundGoals.orange >= goalThreshold) {
        stopRoundTimer();
        showRotationToast(`🟠 ${roundGoals.orange} goluri primite — IESE!`);
        if (navigator.vibrate) navigator.vibrate([200,100,200]);
        setTimeout(() => doRotation('orange', 'goals'), 600);
    } else if (roundGoals.green >= goalThreshold) {
        stopRoundTimer();
        showRotationToast(`🟢 ${roundGoals.green} goluri primite — IESE!`);
        if (navigator.vibrate) navigator.vibrate([200,100,200]);
        setTimeout(() => doRotation('green', 'goals'), 600);
    }
}

// ── Save pairing (call BEFORE swapping colors) ────────────────────
function savePairing(reason) {
    // Only save if there's actually been play (goals or timer ran)
    const oG = roundGoalLog.filter(g => g.team === 'orange').length;
    const gG = roundGoalLog.filter(g => g.team === 'green').length;
    const durationSec = timerSeconds() - roundStartSec;

    const oTid = getTeamIdByColor('orange');
    const gTid = getTeamIdByColor('green');

    const scores = {};
    if (oTid) scores[oTid] = oG;
    if (gTid) scores[gTid] = gG;

    matchPairings.push({
        num: matchPairings.length + 1,
        teamOnField: [oTid, gTid].filter(Boolean),
        scores,
        orangePlayers: players.filter(p => p.status === 'orange').map(p => p.name),
        greenPlayers:  players.filter(p => p.status === 'green').map(p => p.name),
        goals: [...roundGoalLog],
        durationSec: Math.max(0, durationSec),
        endReason: reason,
        endedAt: new Date().toISOString(),
    });
}

// ── Rotation ──────────────────────────────────────────────────────
async function doRotation(loserColor, reason) {
    const bench = players.filter(p => p.status === 'bench');
    const losers = players.filter(p => p.status === loserColor);
    if (!bench.length || !losers.length) return;

    // 1. Save the completed round BEFORE any state changes
    savePairing(reason);

    // 2. Swap players in memory
    losers.forEach(p => p.status = 'bench');
    bench.forEach(p => p.status = loserColor);

    // 3. Update teamId↔color mapping (direct swap, no player lookup needed)
    swapTeamColors(loserColor);

    // 4. Reset round state
    roundGoals = { orange: 0, green: 0 };
    roundGoalLog = [];
    roundStartSec = timerSeconds();

    // 5. Restart round timer
    restartRoundTimer();
    const rtBar = document.getElementById('roundTimeBar');
    if (rtBar) rtBar.style.display = timerState === 'running' ? 'flex' : 'none';

    // 6. Save to DB
    try {
        await Promise.all([...losers, ...bench].map(p =>
            sb.from('players').update({ status: p.status }).eq('id', p.id)
        ));
    } catch(e) { console.warn('swap save:', e.message); }

    showRotationToast(`${loserColor==='orange'?'🟠 PORTOCALIU':'🟢 VERDE'} IESE · Echipa nouă INTRĂ`);
    render();
}

async function manualSwap(loserColor) {
    stopRoundTimer();
    await doRotation(loserColor, 'manual');
}

function showRotationToast(msg) {
    const el = document.getElementById('rotationToast');
    if (!el) return;
    el.textContent = msg; el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Utilities ─────────────────────────────────────────────────────
function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2800); }
function bump(team) { const el = document.getElementById(team==='orange'?'scoreO':'scoreG'); el.classList.add('bump'); setTimeout(() => el.classList.remove('bump'), 200); }
function teamScoreReal(team) { return goals.filter(g => g.team === team).length; }
function goalsMap() { const m = {}; goals.forEach(g => { m[g.player_name] = (m[g.player_name]||0)+1; }); return m; }

// ── Load ──────────────────────────────────────────────────────────
async function loadAll() {
    const [{ data: pl }, { data: gl }] = await Promise.all([
        sb.from('players').select('id,name,status').order('name'),
        sb.from('live_goals').select('*').order('created_at', { ascending: true }),
    ]);
    players = pl || []; goals = gl || [];
    // If 3-team mode was on but registry is empty (page reload), reinit
    if (threeTeamMode && Object.keys(colorMap).length === 0) {
        initTeamRegistry();
    }
    render();
}

// ── Render ────────────────────────────────────────────────────────
function render() {
    // If 3-team active but registry still empty, try to init now
    if (threeTeamMode && Object.keys(colorMap).length === 0 && players.length) {
        initTeamRegistry();
    }

    const orange = players.filter(p => p.status === 'orange');
    const green  = players.filter(p => p.status === 'green');
    const realGoals = goals.filter(g => !String(g.id).startsWith('tmp_'));

    // Score: per-round in 3-team, cumulative otherwise
    const oScore = threeTeamMode
        ? roundGoalLog.filter(g => g.team === 'orange').length
        : goals.filter(g => g.team === 'orange').length;
    const gScore = threeTeamMode
        ? roundGoalLog.filter(g => g.team === 'green').length
        : goals.filter(g => g.team === 'green').length;

    document.getElementById('scoreO').textContent = oScore;
    document.getElementById('scoreG').textContent = gScore;

    // Score labels with team ID badges
    const oTid = threeTeamMode ? getTeamIdByColor('orange') : null;
    const gTid = threeTeamMode ? getTeamIdByColor('green')  : null;
    document.getElementById('lblO').innerHTML = '🟠 Portocaliu' + (oTid ? ' '+tidBadge(oTid) : '');
    document.getElementById('lblG').innerHTML = 'Verde 🟢'      + (gTid ? ' '+tidBadge(gTid) : '');

    // Score sub-line: cumulative between same two teams
    const subEl = document.getElementById('scoreSub');
    if (subEl) {
        if (threeTeamMode && oTid && gTid) {
            const { sA, sB, count } = getCumulativeScore(oTid, gTid);
            subEl.innerHTML = count > 0
                ? `Total ${tidBadge(oTid)} vs ${tidBadge(gTid)}: <b>${sA} - ${sB}</b> (${count} tur${count!==1?'e':''})`
                : '';
        } else {
            subEl.innerHTML = '';
        }
    }

    // Undo bar
    const lastG = realGoals[realGoals.length-1] || null;
    if (lastG) {
        const min = lastG.minute != null ? lastG.minute+"' · " : '';
        document.getElementById('undoLbl').innerHTML = 'Ultimul gol: <span>'+min+lastG.player_name+'</span>';
        document.getElementById('undoBtn').classList.add('show');
    } else {
        document.getElementById('undoLbl').textContent = 'Niciun gol înregistrat';
        document.getElementById('undoBtn').classList.remove('show');
    }

    // Finalize button
    document.getElementById('btnFinalize').disabled = realGoals.length === 0 && matchPairings.length === 0;

    // Teams grid
    const wrap = document.getElementById('teamsWrap');
    if (!orange.length && !green.length) {
        wrap.innerHTML = '<div class="empty-teams">Nicio echipă activă.<br><small>Setează jucătorii în aplicație.</small></div>';
    } else {
        const gpm = goalsMap();
        const makeRows = (pls, team) => pls.map(p => {
            const cnt = gpm[p.name] || 0;
            return '<div class="pr">'
                + '<div class="pr-name">'+p.name+'</div>'
                + '<button class="pr-minus'+(cnt?' show':'')
                    +'" onclick="removeGoal(\''+p.name+'\',\''+team+'\')">−</button>'
                + '<div class="pr-cnt'+(cnt?' has':'')+'">'+( cnt||'·' )+'</div>'
                + '<button class="pr-plus" onclick="addGoal(\''+p.name+'\',\''+team+'\')">+</button>'
                + '</div>';
        }).join('');
        const oBadge = threeTeamMode ? '<span class="round-badge">'+(roundGoals.orange||0)+'/'+goalThreshold+' prim.</span>' : '';
        const gBadge = threeTeamMode ? '<span class="round-badge">'+(roundGoals.green||0)+'/'+goalThreshold+' prim.</span>'  : '';
        const oTidH  = oTid ? tidBadge(oTid)+' ' : '';
        const gTidH  = gTid ? tidBadge(gTid)+' ' : '';
        wrap.innerHTML =
            '<div class="team-col o-col">'
                + '<div class="team-hd">'+oTidH+'<span class="team-hd-lbl o">🟠 Portocaliu</span>'+oBadge+' <span class="team-hd-cnt">'+oScore+'G</span></div>'
                + makeRows(orange, 'orange')
            + '</div>'
            + '<div class="team-col g-col">'
                + '<div class="team-hd">'+gTidH+'<span class="team-hd-lbl g">🟢 Verde</span>'+gBadge+' <span class="team-hd-cnt">'+gScore+'G</span></div>'
                + makeRows(green, 'green')
            + '</div>';
    }

    // 3-team bar
    const bar = document.getElementById('threeBar');
    if (bar) {
        bar.classList.toggle('show', threeTeamMode);
        if (threeTeamMode) {
            const thrEl = document.getElementById('thrVal'); if (thrEl) thrEl.textContent = goalThreshold;
            const tlEl  = document.getElementById('timeLimitVal'); if (tlEl) tlEl.textContent = timeLimitMin;
            const bench = players.filter(p => p.status === 'bench');
            const bTid  = getTeamIdByColor('bench');
            const wp = document.getElementById('waitingPlayers');
            if (wp) wp.innerHTML = bTid ? tidBadge(bTid)+' '
                + (bench.length
                    ? bench.map(p=>`<span style="background:#1c1f2b;border:1px solid #2a2d40;padding:2px 8px;border-radius:5px;color:#888;">${p.name}</span>`).join('')
                    : '<span style="color:#333;font-size:.72rem;">Nimeni</span>')
                : '<span style="color:#333;font-size:.72rem;">Niciun jucător pe bancă</span>';
            const rtBar = document.getElementById('roundTimeBar');
            if (rtBar) rtBar.style.display = timerState === 'running' ? 'flex' : 'none';
        }
    }

    renderLog(realGoals);
    renderTureHistory();
    updateRoundTimerBar();
}

// ── Ture history ──────────────────────────────────────────────────
function renderTureHistory() {
    const section = document.getElementById('tureSection');
    const body    = document.getElementById('tureBody');
    const cnt     = document.getElementById('tureCnt');
    if (!section || !body) return;

    const show = threeTeamMode && matchPairings.length > 0;
    section.classList.toggle('show', show);
    if (cnt) cnt.textContent = matchPairings.length;
    if (!show) return;

    body.innerHTML = [...matchPairings].reverse().map(p => {
        const [tA, tB] = p.teamOnField;
        const sA = p.scores[tA] || 0;
        const sB = p.scores[tB] || 0;
        const winA = sA > sB, winB = sB > sA;
        const cA = winA ? '#69f0ae' : winB ? '#ef9a9a' : '#aaa';
        const cB = winB ? '#69f0ae' : winA ? '#ef9a9a' : '#aaa';
        const min = p.durationSec ? Math.ceil(p.durationSec/60)+"'" : '';
        const reasonLabels = { goals:'goluri', time:'timp', manual:'manual', final:'final' };
        const rLabel = reasonLabels[p.endReason] || p.endReason;
        return `<div class="tur-row">
            <span class="tur-num">Tur ${p.num}</span>
            <span class="tur-teams">${tidBadge(tA)} ${tidBadge(tB)}</span>
            <span class="tur-score" style="color:#fff">
                <span style="color:${cA}">${sA}</span>
                <span style="color:#333;font-size:.7rem;margin:0 2px">-</span>
                <span style="color:${cB}">${sB}</span>
            </span>
            <span class="tur-meta">${min}<span class="tur-reason ${p.endReason}">${rLabel}</span></span>
        </div>`;
    }).join('');
}

function toggleTure() {
    const body    = document.getElementById('tureBody');
    const chevron = document.getElementById('tureChevron');
    if (!body) return;
    const open = body.classList.toggle('open');
    if (chevron) chevron.textContent = open ? '▼' : '▲';
}

// ── Log ───────────────────────────────────────────────────────────
function renderLog(realGoals) {
    document.getElementById('logCnt').textContent = realGoals.length;
    const panel = document.getElementById('logPanel');
    const empty = document.getElementById('logEmpty');
    panel.querySelectorAll('.log-entry').forEach(e => e.remove());
    if (!realGoals.length) { if (empty) empty.style.display = 'block'; return; }
    if (empty) empty.style.display = 'none';
    const frag = document.createDocumentFragment();
    [...realGoals].reverse().forEach(g => {
        const div = document.createElement('div');
        div.className = 'log-entry';
        const dot = g.team === 'orange' ? 'var(--o)' : 'var(--g)';
        const min = g.minute != null ? g.minute+"'" : "—'";
        div.innerHTML = '<span class="log-min">'+min+'</span>'
            + '<div class="log-dot" style="background:'+dot+';"></div>'
            + '<span class="log-name">'+g.player_name+'</span>'
            + '<span class="log-badge">⚽ Gol</span>';
        frag.appendChild(div);
    });
    panel.insertBefore(frag, panel.firstChild);
}

function toggleLog() {
    const panel   = document.getElementById('logPanel');
    const chevron = document.getElementById('logChevron');
    chevron.textContent = panel.classList.toggle('open') ? '▼' : '▲';
}

// ── Goal actions ──────────────────────────────────────────────────
async function addGoal(name, team) {
    if (navigator.vibrate) navigator.vibrate(40);
    const minute = timerState !== 'idle' ? timerMinute() : null;
    const tmpId  = 'tmp_' + Date.now();
    const goalObj = { id: tmpId, player_name: name, team, minute, created_at: new Date().toISOString() };

    goals.push(goalObj);

    if (threeTeamMode) {
        // The team that scored makes the opposing team concede
        const opposing = team === 'orange' ? 'green' : 'orange';
        roundGoals[opposing] = (roundGoals[opposing] || 0) + 1;
        roundGoalLog.push({ ...goalObj });
    }

    render(); bump(team);
    if (threeTeamMode) checkGoalRotation();

    try {
        const { data, error } = await sb.from('live_goals').insert({ player_name: name, team, minute }).select().single();
        if (error) throw error;
        // Replace tmp with real
        goals = goals.map(g => g.id === tmpId ? data : g);
        if (threeTeamMode) {
            const i = roundGoalLog.findIndex(g => g.id === tmpId);
            if (i !== -1) roundGoalLog[i] = { ...roundGoalLog[i], id: data.id };
        }
        render();
    } catch(e) {
        goals = goals.filter(g => g.id !== tmpId);
        if (threeTeamMode) {
            roundGoalLog = roundGoalLog.filter(g => g.id !== tmpId);
            const opposing = team === 'orange' ? 'green' : 'orange';
            roundGoals[opposing] = Math.max(0, (roundGoals[opposing]||0) - 1);
        }
        render(); showToast('⚠️ ' + e.message);
    }
}

async function removeGoal(name, team) {
    const arr = [...goals].map((g,i) => ({g,i})).filter(({g}) => g.player_name===name && g.team===team && !String(g.id).startsWith('tmp_'));
    if (!arr.length) return;
    const { g, i } = arr[arr.length-1];
    goals.splice(i, 1);
    if (threeTeamMode) {
        const ri = roundGoalLog.findIndex(x => x.id === g.id);
        if (ri !== -1) {
            roundGoalLog.splice(ri, 1);
            const opposing = team === 'orange' ? 'green' : 'orange';
            roundGoals[opposing] = Math.max(0, (roundGoals[opposing]||0) - 1);
        }
    }
    render();
    try { await sb.from('live_goals').delete().eq('id', g.id); }
    catch(e) { goals.splice(i, 0, g); render(); showToast('⚠️ ' + e.message); }
}

async function undoLast() {
    const realGoals = goals.filter(g => !String(g.id).startsWith('tmp_'));
    const lastG = realGoals[realGoals.length-1];
    if (!lastG) return;
    goals = goals.filter(x => x.id !== lastG.id);
    if (threeTeamMode) {
        const ri = roundGoalLog.findIndex(x => x.id === lastG.id);
        if (ri !== -1) {
            roundGoalLog.splice(ri, 1);
            const opposing = lastG.team === 'orange' ? 'green' : 'orange';
            roundGoals[opposing] = Math.max(0, (roundGoals[opposing]||0) - 1);
        }
    }
    render();
    try { await sb.from('live_goals').delete().eq('id', lastG.id); }
    catch(e) { showToast('⚠️ ' + e.message); }
}

// ── Finalize ──────────────────────────────────────────────────────
function openFinalize() {
    const realGoals = goals.filter(g => !String(g.id).startsWith('tmp_'));
    const oScore = realGoals.filter(g => g.team === 'orange').length;
    const gScore = realGoals.filter(g => g.team === 'green').length;
    const winner = oScore > gScore ? 'orange' : gScore > oScore ? 'green' : 'draw';
    const winnerLabel = winner==='orange' ? '🟠 Portocaliu' : winner==='green' ? '🟢 Verde' : 'Egal';
    const winColor = winner==='orange' ? 'var(--o)' : winner==='green' ? 'var(--g)' : '#aaa';

    const scorerMap = {};
    realGoals.forEach(g => {
        if (!scorerMap[g.player_name]) scorerMap[g.player_name] = { count:0, team:g.team, mins:[] };
        scorerMap[g.player_name].count++;
        if (g.minute != null) scorerMap[g.player_name].mins.push(g.minute+"'");
    });
    const sorted = Object.entries(scorerMap).sort((a,b) => b[1].count - a[1].count);
    const mvp = sorted[0];
    const mvpHtml = mvp ? `<div class="mvp-row"><div class="mvp-icon">🥇</div><div><div class="mvp-info-lbl">MVP Meci</div><div class="mvp-info-name">${mvp[0]} · ${mvp[1].count} gol${mvp[1].count!==1?'uri':''}</div></div></div>` : '';
    const scorersHtml = sorted.length
        ? sorted.map(([name, d]) => {
            const dot = d.team==='orange' ? 'var(--o)' : 'var(--g)';
            return `<div class="scorer-row"><div class="scorer-dot" style="background:${dot};"></div><span class="scorer-name">${name}</span><span class="scorer-goals">${d.count}⚽</span><span class="scorer-mins">${d.mins.length?' · '+d.mins.join(', '):''}</span></div>`;
          }).join('')
        : '<div style="color:#333;font-size:.78rem;padding:4px 0;">Niciun marcator.</div>';

    // 3-team: ture summary in dialog (include current round if has goals)
    let tureHtml = '';
    if (threeTeamMode) {
        const allPairings = [...matchPairings];
        // Preview current round if it has goals
        const oG = roundGoalLog.filter(g => g.team==='orange').length;
        const gG = roundGoalLog.filter(g => g.team==='green').length;
        if (oG > 0 || gG > 0) {
            const oTid = getTeamIdByColor('orange'), gTid = getTeamIdByColor('green');
            allPairings.push({
                num: allPairings.length+1,
                teamOnField: [oTid, gTid].filter(Boolean),
                scores: { [oTid]: oG, [gTid]: gG },
                durationSec: timerSeconds() - roundStartSec,
                endReason: 'final',
            });
        }
        if (allPairings.length) {
            const rows = allPairings.map(p => {
                const [tA, tB] = p.teamOnField;
                const sA = p.scores[tA]||0, sB = p.scores[tB]||0;
                const min = p.durationSec ? Math.ceil(p.durationSec/60)+"'" : '';
                return `<div style="display:flex;gap:8px;align-items:center;padding:4px 0;border-bottom:1px solid #0f1118;font-size:.75rem;">
                    <span style="color:#444;min-width:42px;">Tur ${p.num}</span>
                    ${tidBadge(tA)}
                    <span style="font-family:'Bebas Neue',sans-serif;font-size:1rem;">${sA}-${sB}</span>
                    ${tidBadge(tB)}
                    <span style="color:#444;font-size:.6rem;margin-left:auto;">${min}</span>
                </div>`;
            }).join('');
            tureHtml = `<div class="dialog-section">Ture disputate</div><div>${rows}</div>`;
        }
    }

    document.getElementById('dialogBox').innerHTML = `
        <div class="dialog-title">🏁 Finalizează Meciul</div>
        <div class="dialog-score" style="color:${winColor};">${winnerLabel} <span style="color:#555;font-size:1rem;">${oScore}:${gScore}</span></div>
        ${mvpHtml}${tureHtml}
        <div class="dialog-section">Marcatori</div>
        <div>${scorersHtml}</div>
        <div class="dialog-actions">
            <button class="dia-cancel" onclick="closeDialog()">✕ Înapoi</button>
            <button class="dia-confirm" onclick="finalizeMatch('${winner}',${oScore},${gScore})">✅ Salvează${winner==='draw'?' Egal':' & Finalizează'}</button>
        </div>`;
    document.getElementById('dialogOverlay').classList.add('show');
}

function closeDialog() { document.getElementById('dialogOverlay').classList.remove('show'); }

async function finalizeMatch(winner, oScore, gScore) {
    if (isSaving) return;
    isSaving = true;
    document.querySelectorAll('.dia-confirm').forEach(b => { b.disabled=true; b.textContent='⏳ Se salvează...'; });
    closeDialog();

    // ── 3-team: save each pairing as separate match ────────────────
    if (threeTeamMode) {
        stopRoundTimer();
        // Save current round if it has goals
        const oG = roundGoalLog.filter(g => g.team==='orange').length;
        const gG = roundGoalLog.filter(g => g.team==='green').length;
        if (oG > 0 || gG > 0) savePairing('final');

        try {
            const today = new Date().toLocaleDateString('ro-RO',{day:'2-digit',month:'2-digit',year:'numeric'}).replace(/\//g,'.');
            let savedCount = 0;
            for (const pair of matchPairings) {
                if (!pair.orangePlayers?.length || !pair.greenPlayers?.length) continue;
                const [tA, tB] = pair.teamOnField;
                const pOG = pair.scores[tA]||0, pGG = pair.scores[tB]||0;
                const pWinner = pOG > pGG ? 'Portocaliu' : pGG > pOG ? 'Verde' : 'Egal';
                const { data: mh } = await sb.from('match_history').insert({
                    date: today, winner: pWinner, score: pOG+':'+pGG,
                    imbalanced: Math.abs(pOG-pGG) >= 3,
                    orange_players: pair.orangePlayers, green_players: pair.greenPlayers,
                    started_at: matchStartedAt||null, ended_at: pair.endedAt||new Date().toISOString()
                }).select().single().catch(() => ({ data: null }));

                if (mh?.id && pair.goals?.length) {
                    await sb.from('match_goals').insert(
                        pair.goals.map(g => ({ match_id:mh.id, player_name:g.player_name, team:g.team, goals:1, goals_conceded:0, minute:g.minute??null }))
                    ).catch(() => {});
                    const sc = {}; pair.goals.forEach(g => { sc[g.player_name]=(sc[g.player_name]||0)+1; });
                    const mvpE = Object.entries(sc).sort((a,b) => b[1]-a[1])[0];
                    if (mvpE) await sb.from('mvp_votes').insert({ match_id:mh.id, voter:'system', mvp_player_name:mvpE[0], mvp_type:'goals' }).catch(() => {});
                }
                for (const name of [...pair.orangePlayers, ...pair.greenPlayers]) {
                    const p = players.find(x => x.name === name); if (!p) continue;
                    const inO = pair.orangePlayers.includes(name);
                    const won = (inO && pOG > pGG) || (!inO && pGG > pOG);
                    const pGoals = pair.goals?.filter(g => g.player_name===name).length || 0;
                    await sb.from('players').select('wins,games,match_history,total_goals').eq('id',p.id).single().then(({data:cur}) => {
                        if (!cur) return;
                        return sb.from('players').update({
                            wins: (cur.wins||0)+(won?1:0), games: (cur.games||0)+1,
                            match_history: [...(cur.match_history||[]), won?'W':'L'].slice(-20),
                            total_goals: (cur.total_goals||0)+pGoals
                        }).eq('id',p.id);
                    }).catch(() => {});
                }
                savedCount++;
            }
            await sb.from('live_goals').delete().neq('id','00000000-0000-0000-0000-000000000000');
            goals=[]; roundGoalLog=[]; matchPairings=[]; matchStartedAt=null; roundStartSec=0;
            colorMap={}; teamMap={};
            timerReset(); render();
            showToast(`✅ ${savedCount} meciuri salvate (3 echipe)!`);
            isSaving = false;
        } catch(e) { isSaving=false; showToast('⚠️ '+e.message); }
        return;
    }

    // ── Standard 2-team finalize ───────────────────────────────────
    const orange = players.filter(p => p.status==='orange').map(p => p.name);
    const green  = players.filter(p => p.status==='green').map(p => p.name);
    const winnerLabel = winner==='orange'?'Portocaliu':winner==='green'?'Verde':'Egal';
    const imbalanced = Math.abs(oScore-gScore) >= 3;
    const realGoals = goals.filter(g => !String(g.id).startsWith('tmp_'));
    const goalMap = {};
    realGoals.forEach(g => { if(!goalMap[g.player_name]) goalMap[g.player_name]={count:0,team:g.team}; goalMap[g.player_name].count++; });

    try {
        let endedAt = new Date().toISOString();
        if (matchStartedAt) endedAt = new Date(new Date(matchStartedAt).getTime() + timerSeconds()*1000).toISOString();

        const { data: mh, error: mhErr } = await sb.from('match_history').insert({
            date: new Date().toLocaleDateString('ro-RO',{day:'2-digit',month:'2-digit',year:'numeric'}).replace(/\//g,'.'),
            winner: winnerLabel, score: oScore+':'+gScore, imbalanced,
            orange_players: orange, green_players: green,
            started_at: matchStartedAt||null, ended_at: endedAt
        }).select().single();
        if (mhErr) throw mhErr;

        if (mh?.id) {
            const mvpRows = [];
            ['orange','green'].forEach(team => {
                const tg = Object.entries(goalMap).filter(([,g]) => g.team===team).sort((a,b) => b[1].count-a[1].count);
                if (tg.length && tg[0][1].count > 0) mvpRows.push({ match_id:mh.id, voter:'system', mvp_player_name:tg[0][0], mvp_type:'goals' });
            });
            if (mvpRows.length) await sb.from('mvp_votes').insert(mvpRows).catch(() => {});
            if (realGoals.length) await sb.from('match_goals').insert(
                realGoals.map(g => ({ match_id:mh.id, player_name:g.player_name, team:g.team, goals:1, goals_conceded:0, minute:g.minute??null }))
            );
        }

        await Promise.all([...orange,...green].map(name => {
            const p = players.find(x => x.name===name); if (!p) return null;
            const inO = orange.includes(name);
            const won  = (inO&&winner==='orange')||(!inO&&winner==='green');
            const lost = (inO&&winner==='green') ||(!inO&&winner==='orange');
            const pGoals = goalMap[name]?.count||0;
            return sb.from('players').select('wins,games,match_history,total_goals,last_imbalance_loss').eq('id',p.id).single().then(({data:cur}) => {
                if (!cur) return;
                return sb.from('players').update({
                    wins:(cur.wins||0)+(won?1:0), games:(cur.games||0)+1,
                    match_history:[...(cur.match_history||[]),won?'W':'L'],
                    total_goals:(cur.total_goals||0)+pGoals,
                    last_imbalance_loss:(lost&&imbalanced)?(cur.last_imbalance_loss||0)+1:won?0:(cur.last_imbalance_loss||0)
                }).eq('id',p.id);
            });
        }).filter(Boolean));

        await sb.from('live_goals').delete().neq('id','00000000-0000-0000-0000-000000000000');
        goals=[]; matchStartedAt=null;

        try {
            const active = players.filter(p => p.status==='orange'||p.status==='green');
            if (active.length) {
                await Promise.all(active.map(p => sb.from('players').update({status:'bench'}).eq('id',p.id)));
                active.forEach(p => p.status='bench');
            }
            await sb.from('next_match').update({confirmed_ids:[],absent_ids:[]}).eq('id',1);
        } catch(e) { console.warn('post-match reset:', e.message); }

        timerReset(); render();
        const top = Object.entries(goalMap).sort((a,b) => b[1].count-a[1].count)[0];
        showToast('🏆 '+winnerLabel+' câștigă! '+(top?'🥇 MVP: '+top[0]:''));
        isSaving = false;
    } catch(e) { isSaving=false; showToast('⚠️ '+e.message); }
}

// ── Share ─────────────────────────────────────────────────────────
async function shareScore() {
    const oScore = teamScoreReal('orange'), gScore = teamScoreReal('green');
    const dateStr = new Date().toLocaleDateString('ro-RO',{day:'2-digit',month:'2-digit',year:'numeric'});
    const gpm = goalsMap();
    const topScorers = Object.entries(gpm).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([n,c])=>'⚽ '+n+' ('+c+')').join('\n');
    const text = `🟠 Portocaliu ${oScore} - ${gScore} Verde 🟢\nArena Friends FC · ${dateStr}${topScorers?'\n\n'+topScorers:''}`;
    try {
        if (navigator.share) await navigator.share({title:'Arena Friends FC',text});
        else { await navigator.clipboard.writeText(text); showToast('📋 Scor copiat!'); }
    } catch(e) { showToast('⚠️ Nu s-a putut copia'); }
}

// ── Reset ─────────────────────────────────────────────────────────
async function confirmReset() {
    if (!confirm('Resetezi scorul live, turele și cronometrul?')) return;
    goals=[]; roundGoalLog=[]; matchPairings=[]; matchStartedAt=null;
    roundGoals={orange:0,green:0}; roundStartSec=0;
    colorMap={}; teamMap={};
    timerReset(); stopRoundTimer(); render();
    try { await sb.from('live_goals').delete().neq('id','00000000-0000-0000-0000-000000000000'); }
    catch(e) { showToast('⚠️ '+e.message); }
}

// ── Realtime ──────────────────────────────────────────────────────
function subscribe() {
    sb.channel('live_rt2')
        .on('postgres_changes',{event:'INSERT',schema:'public',table:'live_goals'}, p => {
            if (!goals.some(g => g.id === p.new.id)) {
                const ti = goals.findIndex(g => String(g.id).startsWith('tmp_') && g.player_name===p.new.player_name);
                if (ti !== -1) goals[ti] = p.new; else goals.push(p.new);
                render(); bump(p.new.team);
            }
        })
        .on('postgres_changes',{event:'DELETE',schema:'public',table:'live_goals'}, () => loadAll())
        .on('postgres_changes',{event:'*',schema:'public',table:'players'}, () => {
            sb.from('players').select('id,name,status').order('name').then(({data}) => { players=data||[]; render(); });
        })
        .subscribe();
}

// ── Init ──────────────────────────────────────────────────────────
document.getElementById('dialogOverlay').addEventListener('click', e => { if (e.target===e.currentTarget) closeDialog(); });

// Restore 3-team button visual state on load
(function(){
    const btn = document.getElementById('threeBtn');
    if (btn && threeTeamMode) { btn.style.background='rgba(124,77,255,.4)'; btn.style.color='#fff'; }
})();

async function init() { await loadAll(); subscribe(); }
init();
</script>
