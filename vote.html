<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#0a0c10;color:#fff;font-family:'Rajdhani',sans-serif;min-height:100vh;overscroll-behavior:none;}
:root{--orange:#ff8c00;--green:#28a745;--accent:#3d5afe;--star:#ffcc00;--border:#1e2130;}
.vh{background:#080a12;border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.vlogo{font-family:'Bebas Neue',sans-serif;font-size:1.15rem;letter-spacing:3px;}
.vsub{font-size:.68rem;color:#555;margin-top:1px;}
.id-bar{background:#0d0f18;border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:8px;}
.id-name{font-weight:700;color:var(--star);font-size:.85rem;}
.id-change{font-size:.62rem;color:#333;cursor:pointer;text-decoration:underline;}
.id-change:hover{color:#82b1ff;}
.screen{display:none;}
.screen.active{display:block;}
.id-screen{max-width:380px;margin:50px auto;padding:0 16px;}
.id-title{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:3px;margin-bottom:4px;}
.id-sub{font-size:.78rem;color:#555;margin-bottom:14px;line-height:1.5;}
.id-sel{width:100%;background:#141720;border:1px solid var(--border);color:#fff;padding:10px 12px;border-radius:10px;font-family:'Rajdhani',sans-serif;font-size:.95rem;outline:none;margin-bottom:10px;}
.id-sel:focus{border-color:var(--accent);}
.id-btn{width:100%;padding:12px;border-radius:10px;background:linear-gradient(135deg,#1a2a60,var(--accent));border:1px solid var(--accent);color:#fff;font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:2px;cursor:pointer;}
.main{max-width:560px;margin:0 auto;padding:12px 14px 80px;}
.stitle{font-family:'Bebas Neue',sans-serif;font-size:.85rem;letter-spacing:2px;color:#555;margin:12px 0 6px;}
.match-card{background:#0d0f18;border:1px solid var(--border);border-radius:11px;padding:11px 14px;margin-bottom:7px;cursor:pointer;transition:border-color .15s;display:flex;justify-content:space-between;align-items:center;gap:8px;}
.match-card:hover{border-color:var(--accent);}
.match-card.voted{opacity:.55;cursor:default;}
.mc-left{flex:1;min-width:0;}
.mc-date{font-size:.68rem;color:#555;}
.mc-winner{font-weight:700;font-size:.88rem;margin:1px 0;}
.mc-teams{font-size:.68rem;color:#333;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.mc-badge{font-size:.58rem;padding:2px 6px;border-radius:4px;white-space:nowrap;flex-shrink:0;}
.mc-badge.done{background:rgba(40,167,69,.15);border:1px solid #28a745;color:#69f0ae;}
.mc-badge.open{background:rgba(61,90,254,.12);border:1px solid var(--accent);color:#82b1ff;}
.vote-screen{max-width:560px;margin:0 auto;padding:10px 12px 90px;}
.match-banner{background:#0d0f18;border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;}
.mb-winner{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;}
.mb-meta{font-size:.68rem;color:#555;}
.mb-back{background:none;border:1px solid var(--border);color:#555;padding:4px 10px;border-radius:6px;font-size:.72rem;cursor:pointer;}
.mb-back:hover{color:#fff;border-color:#555;}
.teams-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
@media(max-width:420px){.teams-grid{grid-template-columns:1fr;}}
.team-col{background:#0d0f18;border-radius:12px;border:1px solid var(--border);overflow:hidden;}
.team-col-hd{padding:9px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;}
.team-col-lbl{font-family:'Bebas Neue',sans-serif;font-size:.8rem;letter-spacing:1.5px;}
.team-col-sub{font-size:.58rem;color:#555;margin-top:1px;}
.team-mine-badge{font-size:.55rem;padding:1px 5px;border-radius:4px;background:rgba(61,90,254,.15);border:1px solid var(--accent);color:#82b1ff;margin-left:auto;white-space:nowrap;}
.drag-list{padding:6px;display:flex;flex-direction:column;gap:4px;min-height:50px;}
.drag-item{display:flex;align-items:center;gap:7px;padding:8px 9px;background:#141720;border-radius:8px;border:1px solid #1e2130;cursor:grab;user-select:none;transition:border-color .1s,opacity .15s;touch-action:none;}
.drag-item:active{cursor:grabbing;}
.drag-item.dragging{opacity:.25;border-style:dashed;border-color:#555;}
.drag-placeholder{height:44px;border-radius:8px;border:2px dashed var(--accent);background:rgba(61,90,254,.06);margin-bottom:4px;transition:height .1s;}
.drag-pos{font-family:'Bebas Neue',sans-serif;font-size:.95rem;min-width:18px;text-align:center;color:#333;}
.drag-pos.p1{color:var(--star);}
.drag-pos.p2{color:#aaa;}
.drag-pos.p3{color:#cd7f32;}
.drag-handle{font-size:.85rem;color:#2a2d40;flex-shrink:0;}
.drag-name{flex:1;font-weight:700;font-size:.82rem;}
.drag-instruction{text-align:center;font-size:.68rem;color:#333;padding:4px 0 8px;}
.results-section{display:none;margin-top:8px;}
.results-section.show{display:block;}
.results-card{background:#0d0f18;border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.results-row{display:flex;align-items:center;gap:7px;padding:8px 12px;border-bottom:1px solid #0a0c14;}
.results-row:last-child{border-bottom:none;}
.r-rank{font-family:'Bebas Neue',sans-serif;font-size:.95rem;min-width:22px;text-align:center;color:#555;}
.r-rank.gold{color:var(--star);}
.r-rank.silver{color:#aaa;}
.r-rank.bronze{color:#cd7f32;}
.r-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.r-name{flex:1;font-weight:700;font-size:.83rem;}
.r-bar-wrap{width:70px;height:4px;background:#1e2130;border-radius:2px;overflow:hidden;}
.r-bar{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),#a78bfa);}
.r-bar.top{background:linear-gradient(90deg,var(--star),var(--orange));}
.r-pct{font-family:'Bebas Neue',sans-serif;font-size:.75rem;color:#555;min-width:30px;text-align:right;}
.mvp-badge{font-size:.53rem;padding:1px 4px;border-radius:4px;background:rgba(255,204,0,.15);border:1px solid rgba(255,204,0,.4);color:var(--star);margin-left:3px;}
.submit-bar{position:fixed;bottom:0;left:0;right:0;background:#080a12;border-top:1px solid var(--border);padding:10px 14px;display:flex;align-items:center;gap:8px;z-index:50;}
.submit-hint{font-size:.7rem;color:#555;flex:1;}
.submit-btn{padding:10px 16px;border-radius:9px;font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:2px;cursor:pointer;background:linear-gradient(135deg,#1a3a2a,#28a745);border:1px solid #28a745;color:#fff;white-space:nowrap;}
.submit-btn:disabled{opacity:.35;cursor:not-allowed;}
.empty{text-align:center;padding:40px 16px;color:#333;}
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);background:#1c1f2b;border:1px solid var(--accent);color:#fff;padding:8px 16px;border-radius:9px;font-size:.82rem;font-weight:700;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;}
</style>

<script>
const SB_URL='https://lfnumwbjikiyngdxsgrk.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxmbnVtd2JqaWtpeW5nZHhzZ3JrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MDQ1MzEsImV4cCI6MjA5MDA4MDUzMX0.BrrmEHnOwa66hDqN-GhYCyqHqOqTAV7dswjcOVxx-wc';
const sb=window.supabase.createClient(SB_URL,SB_KEY);
const LS_KEY='vote_identity';
let myName=null,allPlayers=[],allMatches=[],votedIds=new Set(),selMatch=null;
let orderMine=[],orderOpp=[],liveChannel=null;

function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');}
function getMatchParam(){return new URLSearchParams(location.search).get('match');}

async function loadPlayers(){
    const{data}=await sb.from('players').select('id,name').order('name');
    allPlayers=data||[];
    const sel=document.getElementById('playerSel');
    allPlayers.forEach(p=>{const o=document.createElement('option');o.value=p.name;o.textContent=p.name;sel.appendChild(o);});
}

function confirmIdentity(){
    const name=document.getElementById('playerSel').value.trim();
    if(!name){showToast('⚠️ Selectează un jucător!');return;}
    myName=name;localStorage.setItem(LS_KEY,name);enterApp();
}
function logout(){myName=null;localStorage.removeItem(LS_KEY);document.getElementById('idBar').style.display='none';if(liveChannel){sb.removeChannel(liveChannel);liveChannel=null;}showScreen('screenIdentity');}

async function enterApp(){
    document.getElementById('idBarName').textContent=myName;
    document.getElementById('idBar').style.display='flex';
    await loadMatchesAndVotes();
    const matchId=getMatchParam();
    if(matchId){const m=allMatches.find(x=>x.id===matchId);if(m){openVote(m);return;}}
    showScreen('screenMatches');renderMatchList();
}

async function loadMatchesAndVotes(){
    const{data:mh}=await sb.from('match_history').select('*').order('created_at',{ascending:false}).limit(30);
    allMatches=mh||[];
    const{data:myV}=await sb.from('borda_votes').select('match_id').eq('voter_name',myName);
    votedIds=new Set((myV||[]).map(v=>v.match_id));
}

function renderMatchList(){
    const el=document.getElementById('matchList');
    if(!allMatches.length){el.innerHTML='<div class="empty"><div style="font-size:2rem;">🗓️</div><div>Niciun meci.</div></div>';return;}
    el.innerHTML=allMatches.map((m,i)=>{
        const voted=votedIds.has(m.id);
        const wCol=m.winner==='Portocaliu'?'var(--orange)':'#4caf50';
        return '<div class="match-card'+(voted?' voted':'')+'" onclick="'+(voted?'':'openVoteById(\''+m.id+'\')')+'">'+
            '<div class="mc-left">'+
                '<div class="mc-date">'+(m.date||'—')+'</div>'+
                '<div class="mc-winner" style="color:'+wCol+';">🏆 '+(m.winner||'—')+(m.score&&m.score!=='—'?' ('+m.score+')':'')+'</div>'+
                '<div class="mc-teams">🟠 '+((m.orange_players||[]).join(', ')||'—')+'</div>'+
            '</div>'+
            '<span class="mc-badge '+(voted?'done':'open')+'">'+(voted?'✅ Votat':'🗳️ Votează')+'</span>'+
        '</div>';
    }).join('');
}

function openVoteById(id){const m=allMatches.find(x=>x.id===id);if(m)openVote(m);}

function goToMatchList(){
    if(liveChannel){sb.removeChannel(liveChannel);liveChannel=null;}
    document.getElementById('resultsSection').classList.remove('show');
    loadMatchesAndVotes().then(renderMatchList);
    showScreen('screenMatches');
}

function openVote(m){
    selMatch=m;
    const wCol=m.winner==='Portocaliu'?'var(--orange)':'#4caf50';
    document.getElementById('mbWinner').innerHTML='<span style="color:'+wCol+';">🏆 '+(m.winner||'—')+'</span>'+(m.score&&m.score!=='—'?' ('+m.score+')':'');
    document.getElementById('mbMeta').textContent=m.date||'—';
    const orange=(m.orange_players||[]).map(n=>({name:n,team:'orange'}));
    const green=(m.green_players||[]).map(n=>({name:n,team:'green'}));
    const myTeam=orange.find(p=>p.name===myName)?'orange':green.find(p=>p.name===myName)?'green':null;
    orderMine=[...(myTeam==='green'?green:orange)];
    orderOpp=[...(myTeam==='green'?orange:green)];
    const mineColor=myTeam==='green'?'#4caf50':'var(--orange)';
    const oppColor=myTeam==='green'?'var(--orange)':'#4caf50';
    const mineLabel=myTeam==='green'?'🟢 Echipa Ta':'🟠 Echipa Ta';
    const oppLabel=myTeam==='green'?'🟠 Adversari':'🟢 Adversari';
    document.getElementById('teamsGrid').innerHTML=
        '<div class="team-col"><div class="team-col-hd"><div style="width:8px;height:8px;border-radius:50%;background:'+mineColor+';flex-shrink:0;"></div><div><div class="team-col-lbl" style="color:'+mineColor+';">'+mineLabel+'</div><div class="team-col-sub">Sus = cel mai bun</div></div><span class="team-mine-badge">👤 Tu</span></div><div class="drag-list" id="listMine" data-list="mine"></div></div>'+
        '<div class="team-col"><div class="team-col-hd"><div style="width:8px;height:8px;border-radius:50%;background:'+oppColor+';flex-shrink:0;"></div><div><div class="team-col-lbl" style="color:'+oppColor+';">'+oppLabel+'</div><div class="team-col-sub">Sus = cel mai bun</div></div></div><div class="drag-list" id="listOpp" data-list="opp"></div></div>';
    renderList('mine');renderList('opp');initDrag();
    updateSubmitBar();
    document.getElementById('resultsSection').classList.remove('show');
    showScreen('screenVote');
    if(votedIds.has(m.id)){showResultsAfterVote();}else{subscribeRealtime(m.id);}
}

function renderList(which){
    const arr=which==='mine'?orderMine:orderOpp;
    const el=document.getElementById(which==='mine'?'listMine':'listOpp');
    if(!el) return;
    const medals=['🥇','🥈','🥉'];
    el.innerHTML=arr.map((p,i)=>
        '<div class="drag-item" draggable="true" data-name="'+p.name+'" data-list="'+which+'">'+
            '<span class="drag-handle">⠿</span>'+
            '<span class="drag-pos '+(i===0?'p1':i===1?'p2':i===2?'p3':'')+'">'+(medals[i]||(i+1))+'</span>'+
            '<div><div class="drag-name">'+p.name+(p.name===myName?' <span style="font-size:.55rem;color:var(--accent);">tu</span>':'')+'</div></div>'+
        '</div>'
    ).join('');
}

function updateSubmitBar(){
    const voted=selMatch&&votedIds.has(selMatch.id);
    const btn=document.getElementById('submitBtn');
    const hint=document.getElementById('submitHint');
    if(voted){btn.disabled=true;btn.textContent='✅ Ai votat';hint.textContent='Votul tău a fost înregistrat';}
    else{btn.disabled=false;btn.textContent='✅ Trimite Votul';hint.textContent='Trage pentru reordonare, apoi trimite';}
}

// ── Drag & Drop ───────────────────────────────────────────────────
// ── Sortable drag & drop (desktop + touch) ───────────────────────
// Uses placeholder element for clear visual feedback.
// Insert position determined by cursor vs target midpoint.

let _dragSrc = null;     // the item being dragged
let _placeholder = null; // visual placeholder div
let _touchClone = null;  // floating clone for touch

function makePlaceholder(){
    const p = document.createElement('div');
    p.className = 'drag-placeholder';
    p.id = '_dragPlaceholder';
    return p;
}

function removePlaceholder(){
    const p = document.getElementById('_dragPlaceholder');
    if(p) p.remove();
}

function getInsertIndex(list, clientY, excludeEl){
    const items = [...list.querySelectorAll('.drag-item')].filter(i=>i!==excludeEl);
    for(let i=0;i<items.length;i++){
        const r=items[i].getBoundingClientRect();
        if(clientY < r.top + r.height/2) return i;
    }
    return items.length;
}

function applyReorder(which, srcName, insertIdx){
    const arr = which==='mine' ? orderMine : orderOpp;
    const fi = arr.findIndex(p=>p.name===srcName);
    if(fi===-1) return;
    const [mv] = arr.splice(fi,1);
    // insertIdx was computed excluding the dragged item, so it's correct
    const clampedIdx = Math.min(insertIdx, arr.length);
    arr.splice(clampedIdx, 0, mv);
    renderList(which); initDrag();
    if(navigator.vibrate) navigator.vibrate(20);
}

function initDrag(){
    document.querySelectorAll('.drag-list').forEach(list=>{
        // Desktop dragover — move placeholder
        list.addEventListener('dragover', e=>{
            e.preventDefault();
            e.dataTransfer.dropEffect='move';
            if(!_dragSrc) return;
            const idx = getInsertIndex(list, e.clientY, _dragSrc);
            const items = [...list.querySelectorAll('.drag-item')].filter(i=>i!==_dragSrc);
            // Insert placeholder at correct position
            if(idx >= items.length){
                list.appendChild(_placeholder);
            } else {
                list.insertBefore(_placeholder, items[idx]);
            }
        });
        // Desktop drop
        list.addEventListener('drop', e=>{
            e.preventDefault();
            if(!_dragSrc) return;
            const idx = getInsertIndex(list, e.clientY, _dragSrc);
            const which = list.dataset.list;
            removePlaceholder();
            applyReorder(which, _dragSrc.dataset.name, idx);
        });
    });
    document.querySelectorAll('.drag-item').forEach(item=>{
        item.addEventListener('dragstart', e=>{
            _dragSrc = item;
            _placeholder = makePlaceholder();
            _placeholder.style.height = item.offsetHeight+'px';
            setTimeout(()=>item.classList.add('dragging'), 0);
            e.dataTransfer.effectAllowed = 'move';
        });
        item.addEventListener('dragend', ()=>{
            item.classList.remove('dragging');
            removePlaceholder();
            _dragSrc = null;
        });
        // Touch
        initTouch(item);
    });
}

function initTouch(item){
    let startY, origRect, lastIdx=-1, lastList=null;
    item.addEventListener('touchstart', e=>{
        const t = e.touches[0];
        startY = t.clientY;
        origRect = item.getBoundingClientRect();
        _placeholder = makePlaceholder();
        _placeholder.style.height = item.offsetHeight+'px';
        _touchClone = item.cloneNode(true);
        _touchClone.style.cssText = 'position:fixed;top:'+origRect.top+'px;left:'+origRect.left+'px;width:'+origRect.width+'px;z-index:1000;opacity:.85;pointer-events:none;border:1px solid var(--accent);border-radius:8px;background:#1a2060;';
        document.body.appendChild(_touchClone);
        item.style.visibility = 'hidden';
        // Insert placeholder where item was
        item.parentNode.insertBefore(_placeholder, item);
    },{passive:true});

    item.addEventListener('touchmove', e=>{
        e.preventDefault();
        const t = e.touches[0];
        const dy = t.clientY - startY;
        _touchClone.style.top = (origRect.top + dy)+'px';
        // Find list under finger
        _touchClone.style.display='none';
        const under = document.elementFromPoint(t.clientX, t.clientY);
        _touchClone.style.display='';
        const list = under && under.closest('.drag-list');
        if(list){
            lastList = list;
            const idx = getInsertIndex(list, t.clientY, item);
            lastIdx = idx;
            const items = [...list.querySelectorAll('.drag-item')].filter(i=>i!==item);
            if(idx >= items.length){
                list.appendChild(_placeholder);
            } else {
                list.insertBefore(_placeholder, items[idx]);
            }
        }
    },{passive:false});

    item.addEventListener('touchend', e=>{
        if(_touchClone){_touchClone.remove();_touchClone=null;}
        item.style.visibility='';
        removePlaceholder();
        if(lastList && lastIdx !== -1){
            const which = lastList.dataset.list;
            applyReorder(which, item.dataset.name, lastIdx);
        }
        lastIdx=-1; lastList=null;
    });
}

// ── Submit ────────────────────────────────────────────────────────
async function submitVote(){
    if(votedIds.has(selMatch?.id)){showToast('⚠️ Ai votat deja!');return;}
    const rows=[];
    const addBorda=arr=>{const N=arr.length;arr.forEach((p,i)=>rows.push({match_id:selMatch.id,voter_name:myName,player_name:p.name,borda_pts:N-i,ranked_pos:i+1}));};
    addBorda(orderMine);addBorda(orderOpp);
    try{
        const{error}=await sb.from('borda_votes').insert(rows);
        if(error) throw error;
        votedIds.add(selMatch.id);
        document.getElementById('submitBtn').disabled=true;
        document.getElementById('submitBtn').textContent='✅ Votat';
        document.getElementById('submitHint').textContent='Mulțumim!';
        showToast('✅ Vot trimis!');
        showResultsAfterVote();
    }catch(e){showToast(e.code==='23505'?'⚠️ Ai votat deja!':'⚠️ '+e.message);}
}

async function showResultsAfterVote(){
    await loadLiveResults();
    document.getElementById('resultsSection').classList.add('show');
}

async function loadLiveResults(){
    if(!selMatch) return;
    const{data}=await sb.from('borda_votes').select('player_name,borda_pts,voter_name').eq('match_id',selMatch.id);
    const totals={},voters=new Set();
    (data||[]).forEach(r=>{totals[r.player_name]=(totals[r.player_name]||0)+r.borda_pts;voters.add(r.voter_name);});
    const sorted=Object.entries(totals).sort((a,b)=>b[1]-a[1]);
    const maxPts=sorted[0]?.[1]||1;
    const el=document.getElementById('liveResults');
    if(!sorted.length){el.innerHTML='<div style="padding:14px;text-align:center;color:#333;font-size:.8rem;">Fără voturi încă.</div>';return;}
    el.innerHTML=sorted.map(([name,pts],idx)=>{
        const pct=Math.round((pts/maxPts)*100);
        const rc=idx===0?'gold':idx===1?'silver':idx===2?'bronze':'';
        const medal=idx===0?'🥇':idx===1?'🥈':idx===2?'🥉':idx+1+'';
        const isO=(selMatch.orange_players||[]).includes(name);
        return '<div class="results-row">'+
            '<div class="r-rank '+rc+'">'+medal+'</div>'+
            '<div class="r-dot" style="background:'+(isO?'var(--orange)':'#4caf50')+';"></div>'+
            '<div class="r-name">'+name+(idx===0?'<span class="mvp-badge">MVP</span>':'')+'</div>'+
            '<div class="r-bar-wrap"><div class="r-bar'+(idx===0?' top':'')+'" style="width:'+pct+'%;"></div></div>'+
            '<div class="r-pct">'+pct+'%</div>'+
        '</div>';
    }).join('')+'<div style="padding:6px 12px;font-size:.6rem;color:#333;">'+voters.size+' vot'+(voters.size!==1?'uri':'')+'</div>';
}

function subscribeRealtime(matchId){
    if(liveChannel) sb.removeChannel(liveChannel);
    liveChannel=sb.channel('borda_'+matchId)
        .on('postgres_changes',{event:'INSERT',schema:'public',table:'borda_votes',filter:'match_id=eq.'+matchId},
            ()=>{if(document.getElementById('resultsSection').classList.contains('show'))loadLiveResults();})
        .subscribe();
}

async function init(){
    await loadPlayers();
    const saved=localStorage.getItem(LS_KEY);
    if(saved&&allPlayers.find(p=>p.name===saved)){document.getElementById('playerSel').value=saved;myName=saved;enterApp();}
    else{showScreen('screenIdentity');}
}
init();
</script>
