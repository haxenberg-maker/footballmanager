<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Votează · Arena Friends FC</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root{--orange:#ff8c00;--green:#28a745;--dark:#0a0c10;--card:#141720;--star:#ffcc00;--accent:#3d5afe;--border:#252836;}
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'Rajdhani',sans-serif;background:var(--dark);color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column;}
        .spinner{width:40px;height:40px;border:3px solid #252836;border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg)}}
        .loading{position:fixed;inset:0;background:#0a0c10;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;}
        .loading.hidden{display:none;}
        .loading-text{font-size:.82rem;color:#555;letter-spacing:2px;text-transform:uppercase;}
        .header{background:linear-gradient(135deg,#0d0f18,#141720);border-bottom:1px solid var(--border);padding:14px 20px;text-align:center;}
        .header h1{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:4px;color:#fff;}
        .header p{font-size:.72rem;color:#444;letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
        .screen{flex:1;display:none;flex-direction:column;align-items:center;padding:20px 16px;max-width:540px;margin:0 auto;width:100%;}
        .screen.active{display:flex;}
        .sec-title{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:3px;color:#fff;margin-bottom:5px;width:100%;}
        .sec-sub{font-size:.78rem;color:#555;margin-bottom:14px;width:100%;}
        .match-card{width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:all .15s;margin-bottom:8px;}
        .match-card:hover{border-color:var(--accent);background:#1e2130;}
        .mc-date{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;color:#82b1ff;white-space:nowrap;}
        .mc-info{flex:1;}
        .mc-winner{font-size:.8rem;font-weight:700;}
        .mc-winner.o{color:var(--orange);}
        .mc-winner.g{color:#4caf50;}
        .mc-players{font-size:.72rem;color:#444;margin-top:2px;}
        .match-banner{width:100%;background:#0c1220;border-radius:12px;border:1px solid #1a2a4a;padding:12px 16px;margin-bottom:16px;}
        .player-item{width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .15s;margin-bottom:7px;}
        .player-item:hover{border-color:var(--accent);transform:translateX(4px);}
        .p-avatar{width:36px;height:36px;border-radius:50%;background:#1c1f2b;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:.9rem;color:#555;flex-shrink:0;}
        .p-name{font-weight:700;color:#fff;font-size:.95rem;}
        .p-avg{font-size:.72rem;color:var(--star);}
        .tbadge{font-size:.65rem;padding:2px 8px;border-radius:8px;font-weight:700;white-space:nowrap;margin-left:auto;}
        .to{background:rgba(255,140,0,.15);color:var(--orange);border:1px solid rgba(255,140,0,.3);}
        .tg{background:rgba(40,167,69,.15);color:#4caf50;border:1px solid rgba(40,167,69,.3);}
        .empty{text-align:center;padding:28px 16px;color:#444;font-size:.9rem;line-height:1.7;}
        .vote-box{width:100%;background:#141720;border-radius:20px;border:1px solid #2a2d40;overflow:hidden;}
        .vtop{background:linear-gradient(135deg,#0d0f18,#1a1d30);padding:14px 18px 12px;border-bottom:1px solid #1e2130;}
        .vtop-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
        .vwho{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;color:#fff;}
        .vskip{font-size:.75rem;color:#333;background:none;border:none;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:700;padding:4px 8px;}
        .vskip:hover{color:#666;}
        .pbar{flex:1;height:3px;background:#1e2130;border-radius:2px;overflow:hidden;}
        .pfill{height:100%;background:linear-gradient(90deg,var(--accent),#7c4dff);transition:width .4s ease;}
        .ptxt{font-size:.7rem;color:#444;white-space:nowrap;}
        .slide-wrap{position:relative;overflow:hidden;min-height:300px;}
        .slide{padding:18px 18px 12px;opacity:0;transform:translateX(50px);transition:all .3s cubic-bezier(.4,0,.2,1);pointer-events:none;position:absolute;top:0;left:0;width:100%;}
        .slide.active{opacity:1;transform:none;pointer-events:all;position:relative;}
        .slide.exit{opacity:0;transform:translateX(-50px);}
        .slbl{font-size:.63rem;color:#444;text-transform:uppercase;letter-spacing:2px;margin-bottom:2px;}
        .sname{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;letter-spacing:2px;color:#fff;line-height:1;margin-bottom:4px;}
        .smeta{display:flex;gap:8px;align-items:center;margin-bottom:12px;}
        .savg{font-size:.78rem;color:var(--star);font-weight:700;}
        .glbl{font-size:.63rem;color:#555;text-transform:uppercase;letter-spacing:2px;display:flex;justify-content:space-between;margin-bottom:5px;}
        .gval{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;}
        .gval.empty{color:#252836;}
        .gval.filled{color:var(--star);}
        .grow{display:flex;gap:3px;margin-bottom:10px;}
        .gbtn{flex:1;height:44px;border-radius:8px;background:#1c1f2b;border:1px solid #252836;color:#555;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .12s;padding:0;font-family:'Bebas Neue',sans-serif;}
        .gbtn.sel{transform:translateY(-2px);}
        .gbtn[data-v="1"].sel,.gbtn[data-v="2"].sel{background:#e53935;border-color:#e53935;color:#fff;}
        .gbtn[data-v="3"].sel,.gbtn[data-v="4"].sel{background:#ff8c00;border-color:#ff8c00;color:#000;}
        .gbtn[data-v="5"].sel,.gbtn[data-v="6"].sel{background:#ffd600;border-color:#ffd600;color:#000;}
        .gbtn[data-v="7"].sel,.gbtn[data-v="8"].sel{background:#69f0ae;border-color:#69f0ae;color:#000;}
        .gbtn[data-v="9"].sel,.gbtn[data-v="10"].sel{background:#00e5ff;border-color:#00e5ff;color:#000;}
        .dbtn{width:100%;background:transparent;border:1px dashed #252836;color:#444;border-radius:10px;padding:8px;font-size:.78rem;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-family:'Rajdhani',sans-serif;font-weight:700;margin-bottom:5px;}
        .dbtn.open{border-color:#3d2bbf;color:#a78bfa;background:rgba(61,43,191,.08);border-style:solid;}
        .dwrap{max-height:0;overflow:hidden;transition:max-height .35s ease;}
        .dwrap.open{max-height:280px;}
        .dinner{background:#0a0d18;border-radius:10px;padding:11px;border:1px solid #1a1d30;margin-bottom:6px;}
        .sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
        .sg label{font-size:.6rem;color:#555;text-transform:uppercase;letter-spacing:1px;display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;}
        .sv{font-weight:700;font-size:.68rem;}
        .sv.set{color:var(--star);}
        .sv.unset{color:#2a2d40;}
        .srow{display:flex;gap:2px;}
        .sbtn{flex:1;height:22px;border-radius:4px;background:#1c1f2b;border:1px solid #252836;color:#444;font-size:.6rem;cursor:pointer;transition:all .08s;padding:0;font-family:'Rajdhani',sans-serif;font-weight:700;}
        .sbtn.sel{background:var(--star);color:#000;border-color:var(--star);}
        .vfooter{padding:12px 16px;border-top:1px solid #1e2130;display:flex;gap:10px;align-items:center;}
        .dots{display:flex;gap:5px;align-items:center;}
        .dot{width:6px;height:6px;border-radius:50%;background:#252836;transition:all .2s;}
        .dot.active{background:var(--accent);width:18px;border-radius:3px;}
        .dot.done{background:#28a745;}
        .nbtn{flex:1;padding:12px;border-radius:12px;font-size:.9rem;font-weight:700;letter-spacing:1px;background:var(--orange);color:#000;border:none;cursor:pointer;transition:all .15s;font-family:'Rajdhani',sans-serif;}
        .nbtn:disabled{opacity:.3;cursor:not-allowed;}
        .nbtn.last{background:linear-gradient(135deg,#1a7a30,#28a745);color:#fff;}
        .done-wrap{text-align:center;padding:24px 0;}
        .done-icon{font-size:3.5rem;margin-bottom:14px;}
        .done-title{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:3px;color:#fff;margin-bottom:8px;}
        .done-sub{font-size:.88rem;color:#555;margin-bottom:24px;line-height:1.5;}
        .back-btn{background:none;border:1px solid var(--border);color:#555;padding:8px 18px;border-radius:10px;font-size:.82rem;font-weight:700;cursor:pointer;font-family:'Rajdhani',sans-serif;margin-top:10px;}
        .back-btn:hover{border-color:#555;color:#aaa;}
        .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:#1c1f2b;border:1px solid var(--accent);color:#fff;padding:10px 20px;border-radius:12px;font-size:.88rem;font-weight:700;z-index:9999;box-shadow:0 8px 28px rgba(0,0,0,.7);transition:transform .35s cubic-bezier(.34,1.56,.64,1),opacity .3s;opacity:0;pointer-events:none;white-space:nowrap;}
        .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
        @media(max-width:400px){.grow{flex-wrap:wrap;}.gbtn{min-width:calc(20% - 3px);}.sgrid{grid-template-columns:1fr;}}
    </style>
</head>
<body>
<div class="loading" id="loading"><div class="spinner"></div><div class="loading-text">Se încarcă...</div></div>
<div class="toast" id="toast"></div>
<div class="header"><h1>Arena Friends FC</h1><p>Votează jucătorii după meci</p></div>

<!-- S1: Select match -->
<div class="screen active" id="s1">
    <div class="sec-title" style="margin-top:8px;">Selectează Meciul</div>
    <div class="sec-sub">Alege meciul pentru care vrei să votezi</div>
    <div id="matchList" style="width:100%;"></div>
</div>

<!-- S2: Select player -->
<div class="screen" id="s2">
    <div id="mBanner" class="match-banner"></div>
    <div class="sec-title">Cine ești tu?</div>
    <div class="sec-sub" id="s2sub">Jucătorii care nu au votat încă</div>
    <div id="playerList" style="width:100%;"></div>
    <button class="back-btn" onclick="show('s1')">← Schimbă meciul</button>
</div>

<!-- S3: Vote slides -->
<div class="screen" id="s3">
    <div class="vote-box">
        <div class="vtop">
            <div class="vtop-row">
                <span class="vwho" id="vwho"></span>
                <button class="vskip" onclick="show('s2')">Sari peste →</button>
            </div>
            <div style="display:flex;align-items:center;gap:10px;">
                <div class="pbar"><div class="pfill" id="pfill" style="width:0%"></div></div>
                <span class="ptxt" id="ptxt">1/1</span>
            </div>
        </div>
        <div class="slide-wrap" id="slides"></div>
        <div class="vfooter">
            <div class="dots" id="dots"></div>
            <button class="nbtn" id="nbtn" onclick="nextSlide()" disabled>Selectează nota ↓</button>
        </div>
    </div>
    <button class="back-btn" onclick="show('s2')">← Înapoi</button>
</div>

<!-- S4: Done -->
<div class="screen" id="s4" style="justify-content:center;">
    <div class="done-wrap">
        <div class="done-icon">🎉</div>
        <div class="done-title">Mulțumim!</div>
        <div class="done-sub" id="doneTxt"></div>
        <button class="back-btn" onclick="show('s1')">← Votează alt meci</button>
    </div>
</div>

<script>
const SUPABASE_URL='https://lfnumwbjikiyngdxsgrk.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxmbnVtd2JqaWtpeW5nZHhzZ3JrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MDQ1MzEsImV4cCI6MjA5MDA4MDUzMX0.BrrmEHnOwa66hDqN-GhYCyqHqOqTAV7dswjcOVxx-wc';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const CATS={viteza:'⚡ Viteză',tehnica:'🎯 Tehnică',strategie:'🧠 Strategie',aparare:'🛡️ Apărare'};
const today=new Date().toLocaleDateString('ro-RO');
let matches=[],players=[],selMatch=null,myPlayer=null,toVote=[],votes={},detOpen={},curIdx=0;

function parseDate(s){if(!s)return new Date(0);if(s.includes('.')){const[d,m,y]=s.split('.');return new Date(`${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}T12:00:00`);}return new Date(s);}
function show(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id)?.classList.add('active');}
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;requestAnimationFrame(()=>{t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);});}

async function init(){
    const now=new Date();now.setHours(0,0,0,0);
    const[mr,pr]=await Promise.all([
        sb.from('match_history').select('*').order('created_at',{ascending:false}).limit(30),
        sb.from('players').select('id,name').select('*, ratings(general)')
    ]);
    matches=(mr.data||[]).filter(m=>parseDate(m.date)<now);
    players=(pr.data||[]).map(p=>({id:p.id,name:p.name,avg:p.ratings?.length?(p.ratings.reduce((s,r)=>s+(r.general||5),0)/p.ratings.length).toFixed(1):'5.0'}));
    const el=document.getElementById('matchList');
    if(!matches.length){el.innerHTML='<div class="empty">Nu există meciuri în baza de date.</div>';document.getElementById('loading').classList.add('hidden');return;}
    el.innerHTML=matches.map((m,i)=>{
        const all=[...(m.orange_players||[]),...(m.green_players||[])];
        const ps=all.length?all.slice(0,4).join(', ')+(all.length>4?` +${all.length-4}`:''):'Jucători nespecificați';
        return `<div class="match-card" onclick="selMatch_(${i})"><div class="mc-date">${m.date||'—'}</div><div class="mc-info"><div class="mc-winner ${m.winner==='Portocaliu'?'o':'g'}">🏆 ${m.winner||'—'}</div><div class="mc-players">${ps}</div></div></div>`;
    }).join('');
    document.getElementById('loading').classList.add('hidden');
}

async function selMatch_(i){
    selMatch=matches[i];
    const o=selMatch.orange_players||[],g=selMatch.green_players||[];
    document.getElementById('mBanner').innerHTML=`
        <div style="font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:2px;color:#82b1ff;margin-bottom:8px;">${selMatch.date} · 🏆 ${selMatch.winner||'—'}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
            <div><div style="font-size:.63rem;color:var(--orange);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;">🟠 Portocaliu</div>${o.map(n=>`<div style="font-size:.78rem;color:#aaa;">${n}</div>`).join('')||'<div style="color:#333;font-size:.78rem;">—</div>'}</div>
            <div><div style="font-size:.63rem;color:#4caf50;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;">🟢 Verde</div>${g.map(n=>`<div style="font-size:.78rem;color:#aaa;">${n}</div>`).join('')||'<div style="color:#333;font-size:.78rem;">—</div>'}</div>
        </div>`;
    // Check who voted after this match
    const{data:voted}=await sb.from('ratings').select('rater').gt('created_at',selMatch.created_at||'2020-01-01');
    const votedSet=new Set((voted||[]).map(v=>v.rater));
    const allIn=[...o,...g];
    const candidates=allIn.length?players.filter(p=>allIn.includes(p.name)):players;
    const unvoted=candidates.filter(p=>!votedSet.has(p.name)&&!localStorage.getItem(`v_${p.id}_${selMatch.id}`));
    const pList=document.getElementById('playerList');
    if(!unvoted.length){pList.innerHTML='<div class="empty">✅ Toți jucătorii au votat deja pentru acest meci!</div>';}
    else{
        document.getElementById('s2sub').textContent=`${unvoted.length} jucător${unvoted.length!==1?'i':''} nu au votat încă`;
        pList.innerHTML=unvoted.sort((a,b)=>a.name.localeCompare(b.name)).map(p=>{
            const inO=o.includes(p.name),inG=g.includes(p.name);
            const badge=inO?'<span class="tbadge to">🟠</span>':inG?'<span class="tbadge tg">🟢</span>':'';
            const ini=p.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
            return `<div class="player-item" onclick="selPlayer(${p.id})"><div class="p-avatar">${ini}</div><div><div class="p-name">${p.name}</div><div class="p-avg">⭐ ${p.avg}</div></div>${badge}</div>`;
        }).join('');
    }
    show('s2');
}

function selPlayer(pid){
    myPlayer=players.find(p=>p.id==pid);
    if(!myPlayer)return;
    const o=selMatch.orange_players||[],g=selMatch.green_players||[];
    const all=[...o,...g];
    toVote=all.length?players.filter(p=>all.includes(p.name)&&p.id!=pid):players.filter(p=>p.id!=pid);
    if(!toVote.length){toast('⚠️ Nu sunt alți jucători de votat!');return;}
    votes={};detOpen={};curIdx=0;
    toVote.forEach(p=>{votes[p.id]={general:null,viteza:null,tehnica:null,strategie:null,aparare:null};detOpen[p.id]=false;});
    document.getElementById('vwho').textContent=myPlayer.name;
    buildSlides();updProg();
    show('s3');
}

function buildSlides(){
    const wrap=document.getElementById('slides');wrap.innerHTML='';
    const o=selMatch.orange_players||[];
    toVote.forEach((p,idx)=>{
        const inO=o.includes(p.name);
        const badge=`<span class="tbadge ${inO?'to':'tg'}">${inO?'🟠 Portocaliu':'🟢 Verde'}</span>`;
        let gb='';for(let i=1;i<=10;i++)gb+=`<button class="gbtn" data-v="${i}" id="gb-${p.id}-${i}" onclick="pickG(${p.id},${i})">${i}</button>`;
        const sg=Object.keys(CATS).map(cat=>`<div class="sg"><label>${CATS[cat]}<span class="sv unset" id="sv-${p.id}-${cat}">—</span></label><div class="srow" id="sr-${p.id}-${cat}">${Array.from({length:10},(_,i)=>`<button class="sbtn" onclick="pickS(${p.id},'${cat}',${i+1})">${i+1}</button>`).join('')}</div></div>`).join('');
        const sl=document.createElement('div');
        sl.className='slide'+(idx===0?' active':'');sl.id=`sl-${p.id}`;
        sl.innerHTML=`<div class="slbl">Votează jucătorul</div><div class="sname">${p.name}</div><div class="smeta"><span class="savg">⭐ ${p.avg}</span>${badge}</div><div class="glbl"><span>⚽ NOTĂ GENERALĂ</span><span class="gval empty" id="gv-${p.id}">—</span></div><div class="grow">${gb}</div><button class="dbtn" id="db-${p.id}" onclick="togDet(${p.id})">➕ Adaugă detalii</button><div class="dwrap" id="dw-${p.id}"><div class="dinner"><div style="font-size:.65rem;color:#333;margin-bottom:8px;font-style:italic;">Opțional — restul = nota generală</div><div class="sgrid">${sg}</div></div></div>`;
        wrap.appendChild(sl);
    });
    buildDots();updNxt();
}
function pickG(pid,v){
    votes[pid].general=v;
    for(let i=1;i<=10;i++)document.getElementById(`gb-${pid}-${i}`)?.classList.toggle('sel',i===v);
    const el=document.getElementById(`gv-${pid}`);if(el){el.textContent=v;el.className='gval filled';}
    if(navigator.vibrate)navigator.vibrate(30);
    updNxt();buildDots();
}
function pickS(pid,cat,v){
    votes[pid][cat]=v;
    const l=document.getElementById(`sv-${pid}-${cat}`);if(l){l.textContent=v;l.className='sv set';}
    document.querySelectorAll(`#sr-${pid}-${cat} .sbtn`).forEach((b,i)=>b.classList.toggle('sel',i+1===v));
}
function togDet(pid){
    detOpen[pid]=!detOpen[pid];const open=detOpen[pid];
    document.getElementById(`dw-${pid}`)?.classList.toggle('open',open);
    const btn=document.getElementById(`db-${pid}`);if(btn){btn.classList.toggle('open',open);btn.innerHTML=open?'➖ Ascunde detalii':'➕ Adaugă detalii';}
}
function buildDots(){
    document.getElementById('dots').innerHTML=toVote.map((p,i)=>{const done=votes[p.id]?.general!==null,act=i===curIdx;return`<div class="dot ${act?'active':done?'done':''}"></div>`;}).join('');
}
function updProg(){
    const t=toVote.length;
    document.getElementById('pfill').style.width=`${(curIdx/t)*100}%`;
    document.getElementById('ptxt').textContent=`${curIdx+1}/${t}`;
}
function updNxt(){
    const p=toVote[curIdx];if(!p)return;
    const has=votes[p.id]?.general!==null,isLast=curIdx===toVote.length-1;
    const btn=document.getElementById('nbtn');
    btn.disabled=!has;btn.textContent=!has?'Selectează nota ↓':isLast?'💾 Salvează':'Următorul →';
    btn.className='nbtn'+(isLast&&has?' last':'');
}
function nextSlide(){
    const p=toVote[curIdx];
    if(!p||votes[p.id].general===null){toast('⚠️ Selectează nota generală!');return;}
    if(curIdx===toVote.length-1){submitVotes();return;}
    const cur=document.getElementById(`sl-${p.id}`);
    cur?.classList.remove('active');cur?.classList.add('exit');
    setTimeout(()=>{if(cur)cur.style.display='none';},300);
    curIdx++;
    const next=toVote[curIdx];
    const nel=document.getElementById(`sl-${next.id}`);
    if(nel){nel.style.display='';setTimeout(()=>nel.classList.add('active'),20);}
    updProg();updNxt();buildDots();
}
async function submitVotes(){
    let saved=0;
    for(const p of toVote){
        const v=votes[p.id];if(v.general===null)continue;
        const g=v.general;
        try{await sb.from('ratings').insert({player_id:p.id,rater:myPlayer.name,date:today,general:g,viteza:v.viteza??g,tehnica:v.tehnica??g,strategie:v.strategie??g,aparare:v.aparare??g});saved++;}
        catch(e){console.error(e);}
    }
    if(saved>0){localStorage.setItem(`v_${myPlayer.id}_${selMatch.id}`,'1');if(navigator.vibrate)navigator.vibrate([100,50,100]);}
    document.getElementById('doneTxt').textContent=saved>0?`${saved} voturi salvate pentru ${selMatch.date}. Mulțumim, ${myPlayer.name}!`:'Niciun vot salvat.';
    show('s4');
}

init();
</script>
